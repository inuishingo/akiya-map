<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空家マップ｜管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://test-js.zmaps-api.com/zma_loader.js?key=2xYL6LK8wxaJGUxZ8rwdD9rv4sHGXXX51pD8tLUW&auth=referer"></script>

  <!-- SheetJS (xlsx): Excel出力に使用。グローバル XLSX を定義する -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, updateDoc, deleteDoc, doc, deleteField, onSnapshot, query, orderBy }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDloqlUX051jReuAW4_TyncQgGlk03CfO0",
      authDomain: "housemarket-map.firebaseapp.com",
      projectId: "housemarket-map",
      storageBucket: "housemarket-map.firebasestorage.app",
      messagingSenderId: "182625011825",
      appId: "1:182625011825:web:a5f7c989e94a426d5373d0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let map = null;
    let allPins = [];
    let markers = [];
    let activeStatusFilter = "all";
    let activeStaffFilter = "all";
    let activeDateFilter = "all";
    let checkedIds = new Set();
    let selectedPinId = null;

    // ===== 調査グリッド(MVP) 状態 — 管理画面は表示専用（俯瞰のみ・タップ編集なし） =====
    let gridMode = false;       // グリッド進捗オーバーレイの表示ON/OFF（初期OFF）
    let gridWidgets = [];       // グリッド線＋塗りのZDCウィジェット（markersとは別管理）
    let surveyedCells = {};     // gridId -> Firestoreミラー（調査済みマス）

    // 全12種。index.html と同一のキー・ラベル・色で統一。
    const STATUS = {
      // 建物系
      akiya:   { label: "空家",   color: "#3B82F6" },
      chikuko: { label: "築古",   color: "#6366F1" },
      haikyo:  { label: "廃墟",   color: "#A855F7" },
      renpei:  { label: "連棟",   color: "#8B5CF6" },
      shueki:  { label: "収益",   color: "#0EA5E9" },
      souko:   { label: "倉庫",   color: "#64748B" },
      // 土地系
      sarachi: { label: "更地",   color: "#10B981" },
      zasshu:  { label: "雑種地", color: "#84CC16" },
      parking: { label: "駐車場", color: "#14B8A6" },
      tahata:  { label: "田・畑", color: "#65A30D" },
      // NG系
      hansha:  { label: "反社",   color: "#1F2937" },
      ng:      { label: "NG",     color: "#6B7280" },
    };
    const STATUS_GROUPS = [
      { key: "building", label: "建物系", keys: ["akiya", "chikuko", "haikyo", "renpei", "shueki", "souko"] },
      { key: "land",     label: "土地系", keys: ["sarachi", "zasshu", "parking", "tahata"] },
      { key: "ng",       label: "NG系",   keys: ["hansha", "ng"] },
    ];
    // 未定義ステータス（旧データ等）のフォールバック色
    const FALLBACK_COLOR = "#9CA3AF";

    // ===== 担当者カラー（地図ピン） =====
    // 担当者(メールアドレス)ごとに固定色を割り当てる。最大6色、7人目以降はデフォルト色。
    // 割当はFirestore上のメールアドレス昇順で自動付与（人が増減しても順序は安定）。
    const STAFF_PALETTE = ["#2563EB","#0891B2","#059669","#D97706","#7C3AED","#DB2777"];
    const STAFF_DEFAULT_COLOR = "#65A30D";
    let staffColorMap = {};
    function buildStaffColors() {
      const emails = [...new Set(allPins.map(p => p.email).filter(Boolean))].sort();
      staffColorMap = {};
      emails.forEach((e, i) => {
        staffColorMap[e] = i < STAFF_PALETTE.length ? STAFF_PALETTE[i] : STAFF_DEFAULT_COLOR;
      });
    }
    function staffColor(email) {
      return staffColorMap[email] || STAFF_DEFAULT_COLOR;
    }

    // メール→表示名マップ。displayNames コレクション（doc ID=メール, field name）を全件読む。
    // 未登録メールはメールのままフォールバック（落とさない）。手動でdoc追加すれば即反映。
    let staffNameMap = {};
    async function buildStaffNames() {
      staffNameMap = {};
      try {
        const snap = await getDocs(collection(db, "displayNames"));
        snap.forEach(d => {
          const n = d.data().name;
          if (n) staffNameMap[d.id] = n;   // d.id = メールアドレス
        });
      } catch(e) {}
    }
    function staffName(email) {
      return staffNameMap[email] || email || "–";
    }

    // グループ見出し付き <optgroup> を生成（selected 指定で現在値を選択）。
    function statusOptionsHTML(selected) {
      const known = STATUS_GROUPS.map(g =>
        `<optgroup label="${g.label}">` +
        g.keys.map(k => `<option value="${k}" ${selected === k ? "selected" : ""}>${STATUS[k].label}</option>`).join("") +
        `</optgroup>`
      ).join("");
      // 未定義キー（旧データ）は壊さず現状値を選択肢として先頭に残す
      const legacy = (selected && !STATUS[selected])
        ? `<option value="${selected}" selected>${selected}（旧）</option>` : "";
      return legacy + known;
    }

    // 種別フィルタのドロップダウン（すべて＋グループ見出し付き）を描画
    function renderStatusFilter() {
      const sel = document.getElementById("statusFilter");
      if (!sel) return;
      sel.innerHTML =
        `<option value="all">種別：すべて</option>` +
        STATUS_GROUPS.map(g =>
          `<optgroup label="${g.label}">` +
          g.keys.map(k => `<option value="${k}">${STATUS[k].label}</option>`).join("") +
          `</optgroup>`
        ).join("");
      sel.value = activeStatusFilter;
    }
    renderStatusFilter();

    function makeSvgUrl(color, text) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
        <path d="M16 0 C7.16 0 0 7.16 0 16 C0 28 16 40 16 40 C16 40 32 28 32 16 C32 7.16 24.84 0 16 0Z" fill="${color}"/>
        <text x="16" y="21" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="13" font-weight="bold" font-family="sans-serif">${text}</text>
      </svg>`;
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }

    // ===== AUTH =====
    onAuthStateChanged(auth, async user => {
      if (user) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("adminScreen").style.display = "grid";
        document.getElementById("userLabel").textContent = user.email;
        initMap();
        // 表示名マップを先に構築してから購読開始（一覧の担当者を表示名で出すため）
        await buildStaffNames();
        listenPins();
        listenSurveyGrids();   // 調査グリッドの進捗をリアルタイム購読（表示はトグルON時のみ）
      } else {
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("adminScreen").style.display = "none";
      }
    });

    window.doLogin = async () => {
      const email = document.getElementById("email").value.trim();
      const pass  = document.getElementById("pass").value;
      const btn   = document.getElementById("loginBtn");
      btn.disabled = true; btn.textContent = "ログイン中…";
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch(e) {
        showToast("メールアドレスまたはパスワードが違います", "error");
        btn.disabled = false; btn.textContent = "ログイン";
      }
    };
    window.doLogout = () => signOut(auth);

    // ===== 調査グリッド(survey grid) MVP — 表示専用 =====
    // index.html と同一定義（原点/サイズ/版）。管理画面は俯瞰のみでマスのタップ編集はしない。
    const GRID = { lat0: 35.00, lng0: 136.80, refLat: 35.2, sizeM: 250, version: "v1-250m" };
    const GRID_DLAT = GRID.sizeM / 111000;
    const GRID_DLNG = GRID.sizeM / (111000 * Math.cos(GRID.refLat * Math.PI / 180));

    function gridCellCorners(row, col) {
      const s = GRID.lat0 + row * GRID_DLAT, n = GRID.lat0 + (row + 1) * GRID_DLAT;
      const w = GRID.lng0 + col * GRID_DLNG, e = GRID.lng0 + (col + 1) * GRID_DLNG;
      return [ new ZDC.LatLng(s, w), new ZDC.LatLng(n, w), new ZDC.LatLng(n, e), new ZDC.LatLng(s, e) ];
    }

    // 調査済みマスをリアルタイム購読（現場の記録が即・管理画面に反映）。
    function listenSurveyGrids() {
      onSnapshot(collection(db, "survey_grids"), snap => {
        surveyedCells = {};
        snap.forEach(d => { surveyedCells[d.id] = d.data(); });
        if (gridMode) redrawGrid();
      });
    }

    function clearGridWidgets() {
      gridWidgets.forEach(w => { try { map.removeWidget(w); } catch (e) {} });
      gridWidgets = [];
    }

    // 可視範囲のグリッド線＋（調査済み）塗りを描画。地図移動(idle)ごとに呼ぶ。表示専用。
    function redrawGrid() {
      if (!map) return;
      clearGridWidgets();
      if (!gridMode) return;
      const b = map.getLatLngBounds();
      const sw = b.getSouthWest(), ne = b.getNorthEast();
      const rMin = Math.floor((sw.lat - GRID.lat0) / GRID_DLAT);
      const rMax = Math.floor((ne.lat - GRID.lat0) / GRID_DLAT);
      const cMin = Math.floor((sw.lng - GRID.lng0) / GRID_DLNG);
      const cMax = Math.floor((ne.lng - GRID.lng0) / GRID_DLNG);
      if ((rMax - rMin) <= 60 && (cMax - cMin) <= 60) {
        for (let r = rMin; r <= rMax + 1; r++) {
          const lat = GRID.lat0 + r * GRID_DLAT;
          const ln = new ZDC.Polyline(
            [ new ZDC.LatLng(lat, GRID.lng0 + cMin * GRID_DLNG), new ZDC.LatLng(lat, GRID.lng0 + (cMax + 1) * GRID_DLNG) ],
            { color: "#1D4ED8", width: 1, opacity: 0.25 }
          );
          map.addWidget(ln); gridWidgets.push(ln);
        }
        for (let c = cMin; c <= cMax + 1; c++) {
          const lng = GRID.lng0 + c * GRID_DLNG;
          const ln = new ZDC.Polyline(
            [ new ZDC.LatLng(GRID.lat0 + rMin * GRID_DLAT, lng), new ZDC.LatLng(GRID.lat0 + (rMax + 1) * GRID_DLAT, lng) ],
            { color: "#1D4ED8", width: 1, opacity: 0.25 }
          );
          map.addWidget(ln); gridWidgets.push(ln);
        }
      }
      Object.values(surveyedCells).forEach(cell => {
        if (cell.row == null || cell.col == null) return;
        if (cell.row < rMin - 1 || cell.row > rMax + 1 || cell.col < cMin - 1 || cell.col > cMax + 1) return;
        const poly = new ZDC.Polygon(
          gridCellCorners(cell.row, cell.col),
          { fill: "#3B82F6", fillOpacity: 0.30, stroke: "#1D4ED8", strokeWidth: 1 }
        );
        map.addWidget(poly); gridWidgets.push(poly);   // 表示専用：clickは付けない
      });
    }

    // グリッド進捗オーバーレイの表示ON/OFF。ボタン色で状態を明示。
    window.toggleGridMode = () => {
      gridMode = !gridMode;
      const btn = document.getElementById("gridBtn");
      if (btn) {
        btn.classList.toggle("active", gridMode);
        btn.textContent = gridMode ? "▦ グリッドON" : "▦ グリッド";
      }
      redrawGrid();
    };

    // ===== MAP =====
    function initMap() {
      if (map) return;
      ZMALoader.setOnLoad(function(mapOptions, error) {
        if (error) { console.error(error); return; }
        mapOptions.center = new ZDC.LatLng(35.1709, 136.8815);
        mapOptions.zoom = 13;
        mapOptions.movable = true;
        mapOptions.zoomable = true;
        mapOptions.mouseOperation = true;
        mapOptions.touchOperation = true;

        map = new ZDC.Map(
          document.getElementById("map"),
          mapOptions,
          function() {
            map.addControl(new ZDC.ZoomButton('top-left'));
            map.addControl(new ZDC.ScaleBar('bottom-left'));
            // 地図移動・ズーム完了(idle)でグリッドを可視範囲だけ再描画（gridMode中のみ）。
            map.addEventListener("idle", function() { if (gridMode) redrawGrid(); });
            renderMapMarkers();
          },
          function() { console.error("地図初期化失敗"); }
        );
      });
    }

    // ===== REALTIME LISTEN =====
    function listenPins() {
      const q = query(collection(db, "pins"), orderBy("createdAt", "desc"));
      onSnapshot(q, snap => {
        allPins = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        buildStaffColors();
        updateStats();
        updateStaffFilter();
        updateDateFilter();
        renderList();
        renderMapMarkers();
      });
    }

    // ===== STATS =====
    function updateStats() {
      const counts = {};
      Object.keys(STATUS).forEach(k => counts[k] = 0);
      allPins.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });
      document.getElementById("stat-total").textContent = allPins.length;
      // グループ小計（建物系・土地系・NG系）。カードが存在すれば反映。
      STATUS_GROUPS.forEach(g => {
        const sub = g.keys.reduce((n, k) => n + counts[k], 0);
        const el = document.getElementById("stat-group-" + g.key);
        if (el) el.textContent = sub;
      });
    }

    // ===== STAFF FILTER =====
    function updateStaffFilter() {
      const emails = [...new Set(allPins.map(p => p.email).filter(Boolean))].sort();
      const sel = document.getElementById("staffFilter");
      const current = sel.value;
      sel.innerHTML = `<option value="all">担当者：すべて</option>` +
        emails.map(e => `<option value="${e}" ${e===current?"selected":""}>${staffName(e)}</option>`).join("");
    }

    window.setStaffFilter = (val) => {
      activeStaffFilter = val;
      renderList();
      renderMapMarkers();
    };

    // ===== DATE FILTER =====
    function updateDateFilter() {
      const dates = [...new Set(allPins.map(p => p.createdAt?.slice(0,10)).filter(Boolean))].sort().reverse();
      const sel = document.getElementById("dateFilter");
      const current = sel.value;
      sel.innerHTML = `<option value="all">日付：すべて</option>` +
        dates.map(d => `<option value="${d}" ${d===current?"selected":""}>${d}</option>`).join("");
    }

    window.setDateFilter = (val) => {
      activeDateFilter = val;
      renderList();
      renderMapMarkers();
    };

    // ===== STATUS FILTER =====
    window.setFilter = (f) => {
      activeStatusFilter = f;
      const sel = document.getElementById("statusFilter");
      if (sel && sel.value !== f) sel.value = f;
      renderList();
      renderMapMarkers();
    };

    function filtered() {
      return allPins.filter(p => {
        const statusOk = activeStatusFilter === "all" || p.status === activeStatusFilter;
        const staffOk  = activeStaffFilter  === "all" || p.email === activeStaffFilter;
        const dateOk   = activeDateFilter   === "all" || p.createdAt?.slice(0,10) === activeDateFilter;
        return statusOk && staffOk && dateOk;
      });
    }

    // ===== LIST =====
    // 固定連番の表示用フォーマット：3桁ゼロ埋め(#001)。1000件超は自然に4桁へ拡張。
    function fmtSeq(n) {
      return n != null ? "#" + String(n).padStart(3, "0") : "";
    }

    function renderList() {
      const pins = filtered();
      const container = document.getElementById("pinList");
      const hasChecked = checkedIds.size > 0;

      document.getElementById("bulkDeleteBtn").style.display = hasChecked ? "flex" : "none";
      document.getElementById("bulkDeleteBtn").textContent = `🗑 ${checkedIds.size}件削除`;

      // 全選択チェックボックスの状態を「現在表示中のピン」基準で同期
      const selCb = document.getElementById("selectAllCheck");
      if (selCb) {
        const allChecked = pins.length > 0 && pins.every(p => checkedIds.has(p.id));
        selCb.checked = allChecked;
        selCb.indeterminate = !allChecked && pins.some(p => checkedIds.has(p.id));
      }
      const selCnt = document.getElementById("selectCount");
      if (selCnt) selCnt.textContent = checkedIds.size ? `${checkedIds.size}件選択中` : "";

      if (pins.length === 0) {
        container.innerHTML = `<div class="empty">該当するピンがありません</div>`;
        return;
      }
      container.innerHTML = pins.map(p => {
        // 未定義ステータスでも崩れないようガード
        const s = STATUS[p.status];
        const sLabel = s ? s.label : (p.status || "不明");
        // 地番エラー（needsReview or 地番未取得）はバッジを赤にして要確認を示す
        const chibanFailed = p.needsReview === true || !(p.chiban && p.chiban.trim());
        const sColor = chibanFailed ? "#EF4444" : (s ? s.color : FALLBACK_COLOR);
        const date = p.createdAt ? p.createdAt.slice(0, 10) : "–";
        const isChecked = checkedIds.has(p.id);
        const isSelected = selectedPinId === p.id;
        // Excel出力済み（exportedAt あり）はグレーアウト＋出力済行で未出力と区別。
        // 「拾った情報(発見日/担当者)」と「出力した情報」を分けるためカード末尾に独立行で出す。
        const exported = !!p.exportedAt;
        const exportedByName = p.exportedBy ? staffName(p.exportedBy) : "";
        const exportedMD = p.exportedAt
          ? `${Number(p.exportedAt.slice(5,7))}/${Number(p.exportedAt.slice(8,10))}` : "";
        const svUrl = `https://maps.google.com/maps?q=&layer=c&cbll=${p.lat},${p.lng}`;
        return `
        <div class="pin-card ${exported ? "exported" : ""} ${isChecked ? "checked" : ""} ${isSelected ? "selected" : ""}" id="card-${p.id}" onclick="selectPin('${p.id}')">
          <div class="pin-card-top">
            <input type="checkbox" class="pin-check" ${isChecked ? "checked" : ""}
              onclick="toggleCheck('${p.id}',event)">
            ${p.seqNo != null ? `<span class="pin-seq">${fmtSeq(p.seqNo)}</span>` : ""}
            <span class="status-badge" style="background:${sColor};color:#fff">${sLabel}</span>
            <span class="pin-date">${date}</span>
            <span class="pin-staff">${staffName(p.email)}</span>
            <button class="del-btn" onclick="deletePin('${p.id}',event)">🗑</button>
          </div>
          <div class="pin-address">${p.address || "住所なし"}</div>
          ${p.memo ? `<div class="pin-memo">📝 ${p.memo}</div>` : ""}
          <div class="pin-detail-row">
            <span class="detail-label">地番</span>
            <input class="detail-input ${p.chibanManual ? "manual" : ""}" value="${p.chiban || ""}" placeholder="未入力"
              onchange="saveChiban('${p.id}',this.value)" onclick="event.stopPropagation()">
            ${p.chibanManual ? `<span class="manual-badge" title="手修正済み">✎手修正</span>` : ""}
          </div>
          <div class="pin-actions">
            <a class="sv-btn" href="${svUrl}" target="_blank" onclick="event.stopPropagation()">📷 ストリートビュー</a>
            <select class="status-sel" onchange="updateStatus('${p.id}',this.value)" onclick="event.stopPropagation()">
              ${statusOptionsHTML(p.status)}
            </select>
          </div>
          ${exported ? `<div class="export-line">✓ Excel出力済 ${exportedMD}${exportedByName ? ` ・ ${exportedByName}` : ""}</div>` : ""}
        </div>`;
      }).join("");
    }

    // ===== CHECKBOX =====
    window.toggleCheck = (id, e) => {
      e.stopPropagation();
      if (checkedIds.has(id)) { checkedIds.delete(id); }
      else { checkedIds.add(id); }
      renderList();
    };

    // ===== 全選択 / 全解除（現在表示中のピン基準） =====
    window.toggleSelectAll = (el) => {
      const pins = filtered();
      if (el.checked) { pins.forEach(p => checkedIds.add(p.id)); }
      else { pins.forEach(p => checkedIds.delete(p.id)); }
      renderList();
    };

    // ===== DELETE 1件 =====
    window.deletePin = async (id, e) => {
      e.stopPropagation();
      if (!confirm("このピンを削除しますか？")) return;
      try {
        await deleteDoc(doc(db, "pins", id));
        checkedIds.delete(id);
        showToast("削除しました");
      } catch(e) { showToast("削除に失敗しました", "error"); }
    };

    // ===== DELETE まとめて =====
    window.bulkDelete = async () => {
      if (checkedIds.size === 0) return;
      if (!confirm(`${checkedIds.size}件を削除しますか？`)) return;
      try {
        await Promise.all([...checkedIds].map(id => deleteDoc(doc(db, "pins", id))));
        checkedIds.clear();
        showToast("削除しました");
      } catch(e) { showToast("削除に失敗しました", "error"); }
    };

    // ===== MAP MARKERS =====
    function renderMapMarkers() {
      if (!map) return;
      markers.forEach(m => map.removeWidget(m));
      markers = [];
      filtered().forEach(p => {
        // 未定義ステータスでも落ちない・透明にならないようガード
        const s = STATUS[p.status];
        // マーカー色は「担当者(メール)ごとの固定色」。頭文字はステータスを示す。
        // 固定連番(seqNo)はマーカー上のHTMLオーバーレイ(#001形式)で表示する（下の UserWidget）。
        const marker = new ZDC.Marker(
          new ZDC.LatLng(p.lat, p.lng),
          { color: staffColor(p.email), text: s ? s.label[0] : "?" }
        );
        marker.pinId = p.id;
        marker.addEventListener("click", function() { selectPin(p.id); });
        map.addWidget(marker);
        markers.push(marker);

        // ピン番号ラベル(#001形式)をマーカーの上にHTMLオーバーレイ表示。
        // seqNo が無い旧データには付けない。pointer-events:none でマーカークリックを邪魔しない。
        if (p.seqNo != null) {
          // 地番取得失敗（needsReview or 地番未取得）は赤背景で要確認を示す。現地画面(index.html)と色基準を統一。
          const chibanFailed = p.needsReview === true || !(p.chiban && String(p.chiban).trim());
          const labelBg = chibanFailed ? "#EF4444" : staffColor(p.email);
          const seqLabel = new ZDC.UserWidget(
            new ZDC.LatLng(p.lat, p.lng),
            {
              htmlSource:
                '<div style="transform:translateX(-50%);white-space:nowrap;'
                + 'padding:1px 6px;border-radius:9px;'
                + 'background:' + labelBg + ';color:#fff;'
                + 'font-size:11px;font-weight:700;line-height:1.6;'
                + 'border:1px solid rgba(255,255,255,.65);'
                + 'box-shadow:0 1px 3px rgba(0,0,0,.35);'
                + 'pointer-events:none;">' + fmtSeq(p.seqNo) + '</div>',
              offset: new ZDC.Point(0, -58),
              propagation: true,
            }
          );
          map.addWidget(seqLabel);
          // markers 配列に入れておけば再描画時の removeWidget ループで一緒に消える。
          markers.push(seqLabel);
        }
      });
    }
    
    // ===== SELECT PIN =====
    window.selectPin = (id) => {
      selectedPinId = id;

      document.querySelectorAll(".pin-card").forEach(c => c.classList.remove("selected"));
      const card = document.getElementById(`card-${id}`);
      if (card) {
        card.classList.add("selected");
        card.scrollIntoView({ behavior: "smooth", block: "nearest" });
        // 一時ハイライト：タップ毎に再生されるようリフローを挟んでアニメを付け直す
        card.classList.remove("flash");
        void card.offsetWidth;
        card.classList.add("flash");
      }

      renderMapMarkers();

      const pin = allPins.find(p => p.id === id);
      if (pin && map) {
        map.setCenter(new ZDC.LatLng(pin.lat, pin.lng));
        map.setZoom(17);
      }
    };

    // ===== SAVE 地番（手修正）=====
    // 手修正は自動再取得より優先。chibanManual を立て、要確認フラグを解除する。
    window.saveChiban = async (id, value) => {
      try {
        await updateDoc(doc(db, "pins", id), {
          chiban: value.trim(),
          chibanManual: true,
          needsReview: false,
          reviewReason: deleteField(),
        });
        showToast("地番を保存しました");
      } catch(e) { showToast("保存に失敗しました", "error"); }
    };

    // ===== UPDATE STATUS =====
    window.updateStatus = async (id, status) => {
      try {
        await updateDoc(doc(db, "pins", id), { status });
        showToast("ステータスを更新しました");
      } catch(e) { showToast("更新に失敗しました", "error"); }
    };

    // ===== EXCEL EXPORT (SheetJS) =====
    // 住居表示を「町名まで」と「番地のみ」に分割する。
    // 例: 愛知県名古屋市中村区亀島2丁目25-4 → ["愛知県名古屋市中村区亀島2丁目", "25-4"]
    function splitAddress(addr) {
      const a = (addr || "").trim();
      if (!a) return ["", ""];
      // 丁目があればそこで分割（丁目内の数字は町名側に残す）
      const m1 = a.match(/^(.*丁目)(.*)$/);
      if (m1) return [m1[1].trim(), m1[2].trim()];
      // 丁目なし: 末尾の番地（数字＋ハイフン＋番地/号/の）を切り出す
      const m2 = a.match(/^(.*?)([0-9０-９][0-9０-９\-－‐番地号の]*)$/);
      if (m2) return [m2[1].trim(), m2[2].trim()];
      return [a, ""];
    }
    window.exportExcel = async () => {
      // 選択中（チェック済み）のピンのみ出力
      const pins = allPins.filter(p => checkedIds.has(p.id));
      if (pins.length === 0) { showToast("選択中のピンがありません", "error"); return; }
      if (typeof XLSX === "undefined") { showToast("Excelライブラリの読込に失敗しました", "error"); return; }
      // 先頭に No 列（#001形式）。列順: No/発見日/担当者/所在地/住居表記/地番/レ/ステータス/メモ/緯度/経度/拠点
      const header = ["No","発見日","担当者","所在地","住居表記","地番","レ","ステータス","メモ","緯度","経度","拠点"];
      const aoa = [header];
      pins.forEach((p) => {
        const [town, banchi] = splitAddress(p.address);
        aoa.push([
          fmtSeq(p.seqNo),   // No: 地図ピン・カードと同じ固定連番(seqNo)を fmtSeq で #000 形式に。出力ループでの再採番はしない
          p.createdAt?.slice(0,10) || "",
          staffName(p.email),
          town,
          banchi || "",        // 住居表記(番地)：型は下で文字列に固定
          p.chiban || "",      // 地番：型は下で文字列に固定
          "",
          STATUS[p.status]?.label || p.status,
          p.memo || "",
          p.lat ?? "",
          p.lng ?? "",
          p.branch || "",
        ]);
      });
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      // No(列A=0)・住居表記(列E=4)・地番(列F=5)は "71-1"/"#313" 等をExcelが日付/数値化しないよう
      // 文字列型(t:'s')で固定。xlsxはセル型を保持するので、CSV時代の ="..." 式ハックは不要。
      const STR_COLS = [0, 4, 5];
      for (let r = 1; r < aoa.length; r++) {
        STR_COLS.forEach(c => {
          const cell = ws[XLSX.utils.encode_cell({ r, c })];
          if (cell && cell.v !== "") { cell.t = "s"; cell.v = String(cell.v); delete cell.w; delete cell.z; }
        });
      }
      // 列幅（実務で見やすい既定）
      ws["!cols"] = [
        { wch: 6 }, { wch: 12 }, { wch: 10 }, { wch: 28 }, { wch: 12 }, { wch: 12 },
        { wch: 4 }, { wch: 8 }, { wch: 24 }, { wch: 11 }, { wch: 11 }, { wch: 8 },
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "空家マップ");
      XLSX.writeFile(wb, `空家マップ_${new Date().toISOString().slice(0,10)}.xlsx`);
      // 出力対象に exportedAt を記録（一覧で出力済みグレーアウト表示に使う）。
      // ファイルは既にDL済みなので書き込み失敗は握りつぶし、出力自体は止めない。
      const exportedAt = new Date().toISOString();
      const exportedBy = auth.currentUser?.email || "";
      await Promise.all(
        pins.map(p => updateDoc(doc(db, "pins", p.id), { exportedAt, exportedBy }).catch(()=>{}))
      );
      showToast(`Excelを出力しました（${pins.length}件・出力済みに記録）`);
    };

    // ===== TOAST =====
    function showToast(msg, type = "ok") {
      const t = document.getElementById("toast");
      t.textContent = msg; t.className = "toast " + type;
      t.style.opacity = "1";
      setTimeout(() => { t.style.opacity = "0"; }, 2500);
    }

    window.addEventListener("keydown", e => {
      if (e.key === "Enter" && document.getElementById("loginScreen").style.display !== "none") doLogin();
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #f1f5f9; color: #1e293b; height: 100vh; overflow: hidden; }

    #loginScreen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;

    .login-box { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; }
    .login-box input {
      padding: 13px 16px; border-radius: 8px; border: 1px solid #334155;
      background: #1e293b; color: #f8fafc; font-size: 15px; font-family: inherit; outline: none;
    }
    .login-box input:focus { border-color: #3b82f6; }
    #loginBtn {
      padding: 13px; border-radius: 8px; background: #3b82f6; color: #fff;
      font-size: 15px; font-weight: 700; border: none; cursor: pointer;
    }
    #loginBtn:disabled { background: #334155; cursor: not-allowed; }

    #adminScreen {
      display: none;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 380px 1fr;
      height: 100vh;
    }

    .header {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px; background: #0f172a; border-bottom: 1px solid #1e293b;
    }
    .header-title { font-size: 15px; font-weight: 700; color: #f8fafc; margin-right: 4px; }
    #userLabel { font-size: 12px; color: #64748b; }
    .header-spacer { flex: 1; }
    #staffFilter, #dateFilter {
      padding: 6px 10px; border-radius: 6px; border: 1px solid #334155;
      background: #1e293b; color: #94a3b8; font-size: 12px; font-family: inherit; outline: none; cursor: pointer;
    }
    .csv-btn {
      padding: 7px 16px; border-radius: 6px; background: #10b981; color: #fff;
      font-size: 13px; font-weight: 700; border: none; cursor: pointer;
    }
    /* 調査グリッド進捗の表示トグル。OFF=グレー枠 / ON=青塗りで状態を明示 */
    .grid-btn {
      padding: 7px 14px; border-radius: 6px; background: transparent;
      border: 1px solid #334155; color: #94a3b8; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .grid-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .logout-btn {
      padding: 7px 14px; border-radius: 6px; background: transparent;
      border: 1px solid #334155; color: #94a3b8; font-size: 13px; cursor: pointer;
    }

    .left-panel {
      display: flex; flex-direction: column;
      background: #fff; border-right: 1px solid #e2e8f0; overflow: hidden;
    }

    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: #e2e8f0; border-bottom: 1px solid #e2e8f0; flex-shrink: 0;
    }
    .stat-item {
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 4px; background: #fff; cursor: pointer;
    }
    .stat-num { font-size: 18px; font-weight: 700; color: #1e293b; line-height: 1; }
    .stat-label { font-size: 10px; color: #94a3b8; margin-top: 2px; }

    .filter-bar {
      display: flex; gap: 6px; padding: 8px 10px; overflow-x: auto;
      border-bottom: 1px solid #f1f5f9; flex-shrink: 0;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .status-filter-sel {
      flex: 1; padding: 6px 10px; border-radius: 8px; border: 1px solid #e2e8f0;
      font-size: 12px; font-weight: 500; color: #1e293b; background: #fff;
      cursor: pointer; font-family: inherit; outline: none;
    }
    .status-filter-sel:focus { border-color: #3b82f6; }

    .select-all-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin: 6px 8px 0; padding: 6px 10px;
      border-radius: 8px; background: #f8fafc; border: 1px solid #e2e8f0;
    }
    .select-all-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: #334155; cursor: pointer; user-select: none;
    }
    .select-all-label input { cursor: pointer; }
    .select-count { font-size: 12px; color: #64748b; }

    #bulkDeleteBtn {
      display: none; align-items: center; justify-content: center;
      gap: 6px; margin: 6px 8px; padding: 8px;
      border-radius: 8px; background: #fef2f2; border: 1px solid #fca5a5;
      color: #991b1b; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    #bulkDeleteBtn:hover { background: #fee2e2; }

    #pinList { flex: 1; overflow-y: auto; padding: 8px; }
    #pinList::-webkit-scrollbar { width: 4px; }
    #pinList::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }
    .empty { padding: 40px; text-align: center; color: #94a3b8; font-size: 14px; }

    .pin-card {
      border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px;
      margin-bottom: 8px; cursor: pointer; transition: all 0.15s; background: #fff;
    }
    .pin-card:hover { border-color: #94a3b8; }
    .pin-card.selected { border-color: #3b82f6; box-shadow: 0 0 0 2px #bfdbfe; background: #eff6ff; }
    .pin-card.checked { background: #fef9c3; border-color: #eab308; }
    .pin-card.checked.selected { background: #fef9c3; border-color: #3b82f6; }
    /* Excel出力済みピン：グレーアウトで未出力と区別 */
    .pin-card.exported { opacity: 0.55; }
    .pin-card.exported.selected,
    .pin-card.exported.checked { opacity: 1; }  /* 選択/チェック時は見やすく戻す */
    .export-line {
      font-size: 11px; font-weight: 700; color: #fff; background: #6b7280;
      padding: 2px 8px; border-radius: 4px; margin-top: 6px;
      display: inline-block;
    }
    /* ピンタップ時の一時ハイライト（数秒フラッシュ） */
    .pin-card.flash { animation: cardFlash 2s ease-out; }
    @keyframes cardFlash {
      0%   { background: #fde68a; box-shadow: 0 0 0 3px #fbbf24; }
      100% { background: #fff;    box-shadow: none; }
    }

    .pin-card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .pin-check { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .pin-seq { font-size: 13px; font-weight: 800; color: #334155; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .pin-date { font-size: 11px; color: #94a3b8; margin-left: auto; }
    .pin-staff { font-size: 11px; color: #94a3b8; }
    .del-btn {
      padding: 2px 6px; border-radius: 4px; background: transparent;
      border: 1px solid #fca5a5; color: #ef4444; font-size: 12px; cursor: pointer;
    }
    .del-btn:hover { background: #fef2f2; }

    .pin-address { font-size: 13px; font-weight: 500; color: #1e293b; margin-bottom: 4px; line-height: 1.4; }
    .pin-memo { font-size: 12px; color: #64748b; margin-bottom: 8px; }

    .pin-detail-row {
      display: grid; grid-template-columns: 32px 1fr auto; gap: 4px; align-items: center;
      margin-bottom: 8px;
    }
    .detail-label { font-size: 11px; color: #94a3b8; font-weight: 500; }
    .detail-input {
      padding: 5px 8px; border-radius: 5px; border: 1px solid #e2e8f0;
      font-size: 12px; font-family: inherit; outline: none; color: #1e293b; width: 100%;
    }
    .detail-input:focus { border-color: #3b82f6; }
    .detail-input.manual { border-color: #16a34a; background: #f0fdf4; }
    .manual-badge {
      font-size: 10px; color: #16a34a; background: #dcfce7; font-weight: 600;
      padding: 2px 6px; border-radius: 999px; white-space: nowrap;
    }

    .pin-actions { display: flex; gap: 6px; align-items: center; }
    .sv-btn {
      padding: 5px 10px; border-radius: 6px; background: #f1f5f9;
      border: 1px solid #e2e8f0; font-size: 12px; cursor: pointer; white-space: nowrap;
      text-decoration: none; color: #1e293b; display: inline-flex; align-items: center;
    }
    .sv-btn:hover { background: #e2e8f0; }
    .status-sel {
      flex: 1; padding: 5px 8px; border-radius: 6px; border: 1px solid #e2e8f0;
      font-size: 12px; font-family: inherit; outline: none; background: #fff; cursor: pointer;
    }

    .right-panel { display: flex; flex-direction: column; position: relative; }
    #map { flex: 1; width: 100%; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500;
      z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.ok    { background: #065f46; color: #6ee7b7; }
    .toast.error { background: #7f1d1d; color: #fca5a5; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">HOUSE MARKET</div>
  <div class="login-title">空家マップ｜管理画面</div>
  <div class="login-box">
    <input id="email" type="email" placeholder="メールアドレス" autocomplete="email">
    <input id="pass"  type="password" placeholder="パスワード">
    <button id="loginBtn" onclick="doLogin()">ログイン</button>
  </div>
</div>

<div id="adminScreen">
  <div class="header">
    <div class="header-title">🏚 空家マップ 管理画面</div>
    <div id="userLabel"></div>
    <div class="header-spacer"></div>
    <select id="dateFilter" onchange="setDateFilter(this.value)">
      <option value="all">日付：すべて</option>
    </select>
    <select id="staffFilter" onchange="setStaffFilter(this.value)">
      <option value="all">担当者：すべて</option>
    </select>
    <button class="grid-btn" id="gridBtn" onclick="toggleGridMode()" title="調査グリッド進捗の表示切替">▦ グリッド</button>
    <button class="csv-btn" onclick="exportExcel()">📥 Excel出力</button>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>

  <div class="left-panel">
    <!-- 集計カウンタ：総件数＋グループ小計（建物系/土地系/NG系）の4枚。表示専用。
         数字は updateStats() が stat-total / stat-group-* に反映。絞り込みは下のドロップダウンで。 -->
    <div class="stats-bar">
      <div class="stat-item" onclick="setFilter('all')">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">総件数</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" style="color:#3B82F6" id="stat-group-building">0</div>
        <div class="stat-label">建物系</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" style="color:#10B981" id="stat-group-land">0</div>
        <div class="stat-label">土地系</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" style="color:#1F2937" id="stat-group-ng">0</div>
        <div class="stat-label">NG系</div>
      </div>
    </div>

    <div class="filter-bar">
      <select id="statusFilter" class="status-filter-sel" onchange="setFilter(this.value)">
        <option value="all">種別：すべて</option>
      </select>
    </div>

    <div class="select-all-bar">
      <label class="select-all-label">
        <input type="checkbox" id="selectAllCheck" onchange="toggleSelectAll(this)">
        全選択
      </label>
      <span class="select-count" id="selectCount"></span>
    </div>

    <button id="bulkDeleteBtn" onclick="bulkDelete()">🗑 0件削除</button>

    <div id="pinList"><div class="empty">データを読み込み中…</div></div>
  </div>

  <div class="right-panel">
    <div id="map"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
</body>
</html>

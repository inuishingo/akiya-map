<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空家マップ｜管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- TODO: 本番移行時に本番キー(js-api 本番ドメイン)へ差し替え。現状は検証環境キー(test-js)。 -->
  <script src="https://test-js.zmaps-api.com/zma_loader.js?key=2xYL6LK8wxaJGUxZ8rwdD9rv4sHGXXX51pD8tLUW&auth=referer"></script>

  <!-- SheetJS (xlsx): Excel出力に使用。グローバル XLSX を定義する -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, getDoc, addDoc, updateDoc, deleteDoc, doc, deleteField, onSnapshot, query, orderBy, runTransaction }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDloqlUX051jReuAW4_TyncQgGlk03CfO0",
      authDomain: "housemarket-map.firebaseapp.com",
      projectId: "housemarket-map",
      storageBucket: "housemarket-map.firebasestorage.app",
      messagingSenderId: "182625011825",
      appId: "1:182625011825:web:a5f7c989e94a426d5373d0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let map = null;
    let allPins = [];
    let markers = [];
    let reviewOnly = false;     // 「⚠️ 要調査のみ」フィルタ（赤ラベル＝住所不明 or 地番未取得 だけ表示）
    let activeStaffFilter = "all";
    let activeDateFilter = "all";
    let activeGroupFilter = "all";   // 上部カウンターのグループ絞り（all|building|land|ng）。ハイライトにも使用
    let activeStatusFilter = "all";  // ステータスDDの個別分類絞り（all|STATUSキー）。カウンターとAND併用
    let otherCompanyFilter = "all";  // 他社物件フィルタ（all|exclude|only）。既存フィルタと全てAND併用
    let searchQuery = "";       // 左リスト検索（No/住所/地番の部分一致）
    let checkedIds = new Set();
    let selectedPinId = null;
    let myBranch = "名古屋";     // ログイン管理者の所属店(displayNames[email].branch)。読取前は名古屋を既定に。
    // 反社/NG登録（管理画面専用）
    let regMode = false;        // 地図クリックで反社/NG登録するモード
    let regStatus = "hansha";   // 登録ステータス（hansha/ng）
    let lastGeoLatLng = null;   // 直近ジオコード座標（住所からの登録用）
    let regTempMarker = null;   // 一時マーカー（登録前の仮位置）

    // ===== 要確認(赤)判定 — 単一真実 =====
    // 赤＝住所が要確認 or 地番が未取得。index.html と同一定義（色基準を統一）。
    // 表示はこの計算値を真実とし、手補正時に needsReview フラグへ同値を書いて整合させる。
    function isAddrUnknown(p) {
      const a = (p.address || "").trim();
      return !a || a === "住所不明" || a === "（オフライン）" || a === "取得中…" || a === "住所取得中…";
    }
    // 永久ピン（反社/NG）：周回・日付フィルタ例外／削除不可／専用色。status キーで判定。
    const PERMANENT_COLOR = "#374151";
    function isPermanentPin(p) { return p.status === "hansha" || p.status === "ng"; }
    function isChibanMissing(p) {
      if (isPermanentPin(p)) return false;   // 反社/NGは地番レビュー対象外＝地番未取得でも赤にしない
      return !(p.chiban && String(p.chiban).trim());
    }
    function needsReviewNow(p) {
      return isAddrUnknown(p) || isChibanMissing(p);
    }
    // 表示専用: 計算上の要確認に加え、保存済 needsReview(参考地番等)も赤に。
    // ※再計算・書き戻し(手補正)は needsReviewNow のまま。表示・フィルタだけがこの拡張を使う。
    function isReviewFlagged(p) {
      return needsReviewNow(p) || p.needsReview === true;
    }
    // input value="" 属性に安全に埋めるための最小エスケープ
    function escAttr(s) {
      return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
    }

    // ===== 調査グリッド(MVP) 状態 — 管理画面は表示専用（俯瞰のみ・タップ編集なし） =====
    let gridMode = false;       // グリッド進捗オーバーレイの表示ON/OFF（初期OFF）
    let gridWidgets = [];       // グリッド線＋塗りのZDCウィジェット（markersとは別管理）
    let surveyedCells = {};     // gridId -> Firestoreミラー（調査済みマス）

    // 全12種。index.html と同一のキー・ラベル・色で統一。
    // ※他社所有/媒介は STATUS ではなく pin.otherCompany(boolean) で持つ（状態と独立の属性）。
    const STATUS = {
      // 建物系
      akiya:   { label: "空家",   color: "#3B82F6" },
      chikuko: { label: "築古",   color: "#6366F1" },
      haikyo:  { label: "廃墟",   color: "#A855F7" },
      renpei:  { label: "連棟",   color: "#8B5CF6" },
      shueki:  { label: "収益",   color: "#0EA5E9" },
      souko:   { label: "倉庫",   color: "#64748B" },
      // 土地系
      sarachi: { label: "更地",   color: "#10B981" },
      zasshu:  { label: "雑種地", color: "#84CC16" },
      parking: { label: "駐車場", color: "#14B8A6" },
      tahata:  { label: "田・畑", color: "#65A30D" },
      // NG系（反社/NG=永久ピン）
      hansha:  { label: "反社", color: "#1F2937" },
      ng:      { label: "NG",   color: "#6B7280" },
    };
    const STATUS_GROUPS = [
      { key: "building", label: "建物系", keys: ["akiya", "chikuko", "haikyo", "renpei", "shueki", "souko"] },
      { key: "land",     label: "土地系", keys: ["sarachi", "zasshu", "parking", "tahata"] },
      { key: "ng",       label: "NG系", keys: ["hansha", "ng"] },  // key="ng"は互換維持（DOM id/フィルタ）
    ];
    // 未定義ステータス（旧データ等）のフォールバック色
    const FALLBACK_COLOR = "#9CA3AF";

    // ===== 担当者カラー（地図ピン） =====
    // 担当者色は displayNames レジストリの order（0始まりの固定index）で決まる（index.html と同一方式）。
    // 並び順・在席に依存しないので各人の色は不変。order を持つ doc だけが色付け対象（＝調査員）。
    // order 無し/範囲外/未登録（事務員等）は STAFF_DEFAULT_COLOR。STAFF_PALETTE は両ファイル同一定義。
    const STAFF_PALETTE = ["#2563EB","#0891B2","#059669","#D97706","#7C3AED","#DB2777","#DC2626","#A21CAF","#B45309","#475569"];
    const STAFF_DEFAULT_COLOR = "#65A30D";
    let staffColorMap = {};
    async function buildStaffColors() {
      staffColorMap = {};
      try {
        const snap = await getDocs(collection(db, "displayNames"));
        snap.forEach(d => {
          const o = d.data().order;   // 0始まりの固定index（number型）。無ければ色対象外
          if (Number.isInteger(o) && o >= 0 && o < STAFF_PALETTE.length) {
            staffColorMap[d.id] = STAFF_PALETTE[o];   // d.id = メールアドレス
          }
        });
      } catch (e) {
        // displayNames 読取NG時は全員 STAFF_DEFAULT_COLOR にフォールバック
      }
    }
    function staffColor(email) {
      return staffColorMap[email] || STAFF_DEFAULT_COLOR;
    }

    // メール→表示名マップ。displayNames コレクション（doc ID=メール, field name）を全件読む。
    // 未登録メールはメールのままフォールバック（落とさない）。手動でdoc追加すれば即反映。
    let staffNameMap = {};
    async function buildStaffNames() {
      staffNameMap = {};
      try {
        const snap = await getDocs(collection(db, "displayNames"));
        snap.forEach(d => {
          const n = d.data().name;
          if (n) staffNameMap[d.id] = n;   // d.id = メールアドレス
        });
      } catch(e) {}
    }
    function staffName(email) {
      return staffNameMap[email] || email || "–";
    }

    // ログイン管理者自身の所属店を displayNames から取得。読取NG/未設定は "名古屋" フォールバック。
    async function loadMyBranch(email) {
      myBranch = "名古屋";
      try {
        const snap = await getDoc(doc(db, "displayNames", email));
        const b = snap.exists() ? snap.data().branch : null;
        if (b && String(b).trim()) myBranch = b;
      } catch (e) { /* 読取NGは名古屋フォールバック */ }
    }
    // ピンの所属店。branch空/欠落は "名古屋" とみなす（移行期の二重防御。棚卸しでは欠落0件）。
    function pinBranch(p) {
      return (p.branch && String(p.branch).trim()) ? p.branch : "名古屋";
    }

    // グループ見出し付き <optgroup> を生成（selected 指定で現在値を選択）。
    function statusOptionsHTML(selected) {
      const known = STATUS_GROUPS.map(g =>
        `<optgroup label="${g.label}">` +
        g.keys.map(k => `<option value="${k}" ${selected === k ? "selected" : ""}>${STATUS[k].label}</option>`).join("") +
        `</optgroup>`
      ).join("");
      // 未定義キー（旧データ）は壊さず現状値を選択肢として先頭に残す
      const legacy = (selected && !STATUS[selected])
        ? `<option value="${selected}" selected>${selected}（旧）</option>` : "";
      return legacy + known;
    }

    function makeSvgUrl(color, text) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
        <path d="M16 0 C7.16 0 0 7.16 0 16 C0 28 16 40 16 40 C16 40 32 28 32 16 C32 7.16 24.84 0 16 0Z" fill="${color}"/>
        <text x="16" y="21" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="13" font-weight="bold" font-family="sans-serif">${text}</text>
      </svg>`;
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }

    // ===== AUTH =====
    onAuthStateChanged(auth, async user => {
      if (user) {
        // ===== 管理者権限チェック =====
        // admins コレクション(doc ID=uid)に存在しなければ調査員とみなし、admin画面を出さず index へ誘導。
        // 判定は doc存在のみ（ドメイン判定はしない＝ルールの isAdmin と統一）。読取NG時は安全側で拒否。
        let isAdmin = false;
        try { isAdmin = (await getDoc(doc(db, "admins", user.uid))).exists(); } catch (e) { isAdmin = false; }
        if (!isAdmin) {
          alert("この画面は管理者専用です。調査アプリ（index）に移動します。");
          location.href = "index.html";   // セッションは維持＝indexはそのまま使える
          return;
        }
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("adminScreen").style.display = "grid";
        document.getElementById("userLabel").textContent = user.email;
        initStatusFilter();       // ステータスDDの選択肢を構築（1回）
        updateStatsHighlight();   // カウンター初期ハイライト（総件数=全表示）
        initMap();
        // 表示名・担当者色マップ（どちらも displayNames 由来）を先に構築してから購読開始
        await buildStaffNames();
        await buildStaffColors();
        await loadMyBranch(user.email);   // 自店を確定してから購読（listenPins の絞り込みに使う）
        listenPins();
        listenSurveyGrids();   // 調査グリッドの進捗をリアルタイム購読（表示はトグルON時のみ）
      } else {
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("adminScreen").style.display = "none";
      }
    });

    window.doLogin = async () => {
      const email = document.getElementById("email").value.trim();
      const pass  = document.getElementById("pass").value;
      const btn   = document.getElementById("loginBtn");
      btn.disabled = true; btn.textContent = "ログイン中…";
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch(e) {
        showToast("メールアドレスまたはパスワードが違います", "error");
        btn.disabled = false; btn.textContent = "ログイン";
      }
    };
    window.doLogout = () => signOut(auth);

    // ===== 調査グリッド(survey grid) MVP — 表示専用 =====
    // index.html と同一定義（原点/サイズ/版）。管理画面は俯瞰のみでマスのタップ編集はしない。
    const GRID = { lat0: 35.00, lng0: 136.80, refLat: 35.2, sizeM: 250, version: "v1-250m" };
    const GRID_DLAT = GRID.sizeM / 111000;
    const GRID_DLNG = GRID.sizeM / (111000 * Math.cos(GRID.refLat * Math.PI / 180));

    function gridCellCorners(row, col) {
      const s = GRID.lat0 + row * GRID_DLAT, n = GRID.lat0 + (row + 1) * GRID_DLAT;
      const w = GRID.lng0 + col * GRID_DLNG, e = GRID.lng0 + (col + 1) * GRID_DLNG;
      return [ new ZDC.LatLng(s, w), new ZDC.LatLng(n, w), new ZDC.LatLng(n, e), new ZDC.LatLng(s, e) ];
    }

    // 調査済みマスをリアルタイム購読（現場の記録が即・管理画面に反映）。
    function listenSurveyGrids() {
      onSnapshot(collection(db, "survey_grids"), snap => {
        surveyedCells = {};
        snap.forEach(d => { surveyedCells[d.id] = d.data(); });
        if (gridMode) redrawGrid();
      });
    }

    function clearGridWidgets() {
      gridWidgets.forEach(w => { try { map.removeWidget(w); } catch (e) {} });
      gridWidgets = [];
    }

    // 可視範囲のグリッド線＋（調査済み）塗りを描画。地図移動(idle)ごとに呼ぶ。表示専用。
    function redrawGrid() {
      if (!map) return;
      clearGridWidgets();
      if (!gridMode) return;
      const b = map.getLatLngBounds();
      const sw = b.getSouthWest(), ne = b.getNorthEast();
      const rMin = Math.floor((sw.lat - GRID.lat0) / GRID_DLAT);
      const rMax = Math.floor((ne.lat - GRID.lat0) / GRID_DLAT);
      const cMin = Math.floor((sw.lng - GRID.lng0) / GRID_DLNG);
      const cMax = Math.floor((ne.lng - GRID.lng0) / GRID_DLNG);
      if ((rMax - rMin) <= 60 && (cMax - cMin) <= 60) {
        for (let r = rMin; r <= rMax + 1; r++) {
          const lat = GRID.lat0 + r * GRID_DLAT;
          const ln = new ZDC.Polyline(
            [ new ZDC.LatLng(lat, GRID.lng0 + cMin * GRID_DLNG), new ZDC.LatLng(lat, GRID.lng0 + (cMax + 1) * GRID_DLNG) ],
            { color: "#1D4ED8", width: 1, opacity: 0.25 }
          );
          map.addWidget(ln); gridWidgets.push(ln);
        }
        for (let c = cMin; c <= cMax + 1; c++) {
          const lng = GRID.lng0 + c * GRID_DLNG;
          const ln = new ZDC.Polyline(
            [ new ZDC.LatLng(GRID.lat0 + rMin * GRID_DLAT, lng), new ZDC.LatLng(GRID.lat0 + (rMax + 1) * GRID_DLAT, lng) ],
            { color: "#1D4ED8", width: 1, opacity: 0.25 }
          );
          map.addWidget(ln); gridWidgets.push(ln);
        }
      }
      Object.values(surveyedCells).forEach(cell => {
        if (cell.row == null || cell.col == null) return;
        if (cell.row < rMin - 1 || cell.row > rMax + 1 || cell.col < cMin - 1 || cell.col > cMax + 1) return;
        const fillCol = staffColor(cell.surveyedBy);   // 担当者色（null/未登録はdefaultにフォールバック）
        const poly = new ZDC.Polygon(
          gridCellCorners(cell.row, cell.col),
          { fill: fillCol, fillOpacity: 0.30, stroke: fillCol, strokeWidth: 1 }
        );
        // 色付きマス（doc存在）のみクリックで色リセット。無色マスはポリゴン自体が無い＝無反応。
        poly.addEventListener("click", () => resetGridCell(cell));
        map.addWidget(poly); gridWidgets.push(poly);
      });
    }

    // ===== グリッド色リセット（admin専用・1マス）=====
    // 色付き＝調査済みマスの survey_grids doc を削除＝色を未調査に戻す。
    // 枠は GRID から計算描画なので doc 削除でも残る。現場 index 側も onSnapshot で色が追従消去。
    // admin は塗る側ではないので「消す」専用（無色マスにはハンドラを付けていない）。
    async function resetGridCell(cell) {
      const gid = "G_" + cell.row + "_" + cell.col;   // doc ID は row/col から再構成（surveyedDoc の id と一致）
      const who = staffName(cell.surveyedBy) || "不明";
      const when = cell.surveyedDate || "日付不明";
      if (!confirm(`このマスの調査済みをリセットしますか？\n担当：${who}／調査日：${when}\n（枠は残り、色だけ未調査に戻ります）`)) return;
      try {
        await deleteDoc(doc(db, "survey_grids", gid));
        showToast("グリッドの色をリセットしました");
        // surveyedCells の更新・再描画は listenSurveyGrids の onSnapshot が担う（楽観更新は不要）
      } catch (e) {
        showToast("リセットに失敗しました（権限/通信）", "error");
      }
    }

    // グリッド進捗オーバーレイの表示ON/OFF。ボタン色で状態を明示。
    window.toggleGridMode = () => {
      gridMode = !gridMode;
      const btn = document.getElementById("gridBtn");
      if (btn) {
        btn.classList.toggle("active", gridMode);
        btn.textContent = gridMode ? "▦ グリッドON" : "▦ グリッド";
      }
      redrawGrid();
    };

    // ===== MAP =====
    function initMap() {
      if (map) return;
      ZMALoader.setOnLoad(function(mapOptions, error) {
        if (error) { console.error(error); return; }
        mapOptions.center = new ZDC.LatLng(35.1709, 136.8815);
        mapOptions.zoom = 13;
        mapOptions.movable = true;
        mapOptions.zoomable = true;
        mapOptions.mouseOperation = true;
        mapOptions.touchOperation = true;
        // 下地を常時「標準住宅地図デザイン」に（表札＋住居表示。大縮尺=ズームインで視認）。
        // TODO: 本番キーでは契約発行の住宅地図デザインIDへ差し替え（検証環境は Ai3Y2Jwp）。
        mapOptions.zipsMapType = 'Ai3Y2Jwp';

        map = new ZDC.Map(
          document.getElementById("map"),
          mapOptions,
          function() {
            map.addControl(new ZDC.ZoomButton('top-left'));
            map.addControl(new ZDC.ScaleBar('bottom-left'));
            // 地図移動・ズーム完了(idle)でグリッドを可視範囲だけ再描画（gridMode中のみ）。
            map.addEventListener("idle", function() { if (gridMode) redrawGrid(); });
            // 用途地域/地番レイヤ：移動・ズーム後に再描画／用途地域ON時はクリックで属性取得
            map.addEventListener("idle", function(){ redrawActiveLayers(); });
            map.addEventListener("click", function(e){
              if (!e || !e.latlng) return;
              if (regMode) { registerFromClick(e.latlng); return; }   // 反社/NG登録モード優先
              if (youtoOn) queryYouto(e.latlng);
            });
            renderMapMarkers();
          },
          function() { console.error("地図初期化失敗"); }
        );
      });
    }

    // ===== ZENRIN データ重畳（用途地域 / 地番）=====
    // bluemap_test.html で実証済みロジックの移植。認証は3ヘッダ（x-api-key + Authorization:referer + Referer自動）。
    // TODO: 本番キーに差し替え（WMS_KEY。現状は検証環境キー test-web と対）。
    const WMS_KEY        = "2xYL6LK8wxaJGUxZ8rwdD9rv4sHGXXX51pD8tLUW";
    const BLUEMAP_BASE   = "https://test-web.zmaps-api.com/map/wms/bluemap";
    const YOUTO_BASE     = "https://test-web.zmaps-api.com/map/wms/youto";
    const BLUEMAP_LAYERS = "lp1,ll1,lc1,lw1";
    const YOUTO_LAYERS   = "lp1,ll1";
    // 地番/表札が読める閾値ズーム。引いて見えない時だけここまで寄せる（密集地でも読めるよう20）
    const ZOOM_READABLE  = 20;
    let youtoOn = false, chibanOn = false;
    const layerWidgets = { bluemap:null, youto:null };
    let layerRedrawing = false, layerRedrawQueued = false;

    function wmsHeaders(){ return { "Content-Type":"application/x-www-form-urlencoded", "x-api-key":WMS_KEY, "Authorization":"referer" }; }
    function layerBBoxArr(){ const b=map.getLatLngBounds(); const sw=map.latlngToWebMercator(b.getSouthWest()); const ne=map.latlngToWebMercator(b.getNorthEast()); return [sw[0],sw[1],ne[0],ne[1]]; }
    function removeLayerWidget(slot){ if(layerWidgets[slot]){ try{ map.removeWidget(layerWidgets[slot]); }catch(e){} layerWidgets[slot]=null; } }

    async function drawWmsLayer(slot){
      const conf = (slot==='youto') ? {base:YOUTO_BASE,layers:YOUTO_LAYERS,name:'用途地域'} : {base:BLUEMAP_BASE,layers:BLUEMAP_LAYERS,name:'地番'};
      const size=map.getMapSize(); const bbox=layerBBoxArr().join(",");
      const params={ VERSION:"1.3.0",REQUEST:"GetMap",LAYERS:conf.layers,CRS:"EPSG:3857",BBOX:bbox,WIDTH:size.width,HEIGHT:size.height,FORMAT:"image/png" };
      try{
        const res=await fetch(conf.base,{ method:"POST",headers:wmsHeaders(),body:new URLSearchParams(params) });
        const ct=res.headers.get("content-type")||"";
        if(res.ok && ct.indexOf("image")!==-1){
          const blob=await res.blob(); const url=(window.URL||window.webkitURL).createObjectURL(blob);
          const id=slot+"_wms_"+Date.now();
          const w=new ZDC.UserWidget(map.getLatLngBounds().getNorthWest(),{ htmlSource:'<img id="'+id+'" src="" style="pointer-events:none">', propagation:true });
          map.addWidget(w); layerWidgets[slot]=w; document.getElementById(id).src=url;
        } else {
          const body=await res.text().catch(()=> ""); showToast(conf.name+"の重畳に失敗（"+res.status+"）","error"); console.error(conf.name+" WMS",res.status,body);
        }
      }catch(e){ showToast(conf.name+"の重畳に失敗（通信/CORS）","error"); console.error(conf.name+" WMS exception",e); }
    }

    // ON中のレイヤを順序固定で再描画。多重発火はコアレス。
    // 静止中のidle連発で再描画ループ（チラつき）が起きるため、同一BBOX＋同一トグル状態で
    // 既に描画済みなら何もしない（実際の移動/トグル変更時のみ再描画）。
    let lastLayerKey = "";
    async function redrawActiveLayers(){
      if(!map) return;
      if(layerRedrawing){ layerRedrawQueued=true; return; }
      const active = (youtoOn || chibanOn);
      const key = active ? `${youtoOn?1:0}${chibanOn?1:0}:`+layerBBoxArr().map(n=>Math.round(n)).join(",") : "off";
      const widgetsOk = (!youtoOn || layerWidgets.youto) && (!chibanOn || layerWidgets.bluemap);
      if(key===lastLayerKey && widgetsOk) return;
      layerRedrawing=true;
      try{
        removeLayerWidget('youto'); removeLayerWidget('bluemap');
        if(youtoOn)  await drawWmsLayer('youto');
        if(chibanOn) await drawWmsLayer('bluemap');
        if(youtoOn || chibanOn){ if(gridMode) redrawGrid(); renderMapMarkers(); } // 画像の上にグリッド→ピンを戻す
        lastLayerKey = key;
      } finally {
        layerRedrawing=false;
        if(layerRedrawQueued){ layerRedrawQueued=false; redrawActiveLayers(); }
      }
    }

    // クリック地点の用途地域属性（GetFeatureInfo）→右上ポップアップ
    async function queryYouto(latlng){
      const size=map.getMapSize(); const [minx,miny,maxx,maxy]=layerBBoxArr();
      const p=map.latlngToWebMercator(latlng);
      const I=Math.round((p[0]-minx)/(maxx-minx)*size.width);
      const J=Math.round((maxy-p[1])/(maxy-miny)*size.height);
      const params={ VERSION:"1.3.0",REQUEST:"GetFeatureInfo",LAYERS:YOUTO_LAYERS,QUERY_LAYERS:"lp1",CRS:"EPSG:3857",BBOX:[minx,miny,maxx,maxy].join(","),WIDTH:size.width,HEIGHT:size.height,FORMAT:"image/png",INFO_FORMAT:"application/json",I:I,J:J };
      try{
        const res=await fetch(YOUTO_BASE,{ method:"POST",headers:wmsHeaders(),body:new URLSearchParams(params) });
        const ct=res.headers.get("content-type")||""; const txt=await res.text();
        if(res.ok && ct.indexOf("json")!==-1){
          let obj; try{ obj=JSON.parse(txt); }catch(e){ showToast("用途地域の属性取得に失敗","error"); return; }
          const f=(obj.features&&obj.features[0]&&obj.features[0].properties)||null;
          const box=document.getElementById("youtoInfo");
          if(!f){ box.innerHTML='<span class="yi-close" onclick="closeYoutoInfo()">✕</span>この地点に用途地域データなし（区域外/調整区域の可能性）'; box.style.display="block"; return; }
          box.innerHTML='<span class="yi-close" onclick="closeYoutoInfo()">✕</span>'
            + '<b>用途地域</b>：'+(f.map||'-')+'<br>'
            + '建ぺい率：'+f.kenpei+'% ／ 容積率：'+f.yoseki+'%<br>'
            + '防火：'+f.bouka+' ／ 高度：'+f.koudo+' ／ 都計区分：'+f.tokei;
          box.style.display="block";
        } else { showToast("用途地域の属性取得に失敗（"+res.status+"）","error"); console.error("youto GFI",res.status,txt); }
      }catch(e){ showToast("用途地域の属性取得に失敗（通信/CORS）","error"); console.error("youto GFI exception",e); }
    }

    window.closeYoutoInfo = () => { const b=document.getElementById("youtoInfo"); if(b) b.style.display="none"; };
    window.toggleYouto    = () => { youtoOn=!youtoOn; const btn=document.getElementById("youtoBtn"); if(btn) btn.classList.toggle("active",youtoOn); if(!youtoOn) closeYoutoInfo(); redrawActiveLayers(); };
    window.toggleChiban   = () => { chibanOn=!chibanOn; const btn=document.getElementById("chibanBtn"); if(btn) btn.classList.toggle("active",chibanOn); redrawActiveLayers(); };

    // ===== REALTIME LISTEN =====
    function listenPins() {
      const q = query(collection(db, "pins"), orderBy("createdAt", "desc"));
      onSnapshot(q, snap => {
        // 自店フィルタ：allPins段階で自店ピンだけに絞る（stats/ドロップダウン/地図/Excel が全て自店スコープになる）。
        allPins = snap.docs.map(d => ({ id: d.id, ...d.data() }))
          .filter(p => pinBranch(p) === myBranch);
        updateStats();
        updateStaffFilter();
        updateDateFilter();
        renderList();
        renderMapMarkers();
      });
    }

    // ===== STATS =====
    function updateStats() {
      const counts = {};
      Object.keys(STATUS).forEach(k => counts[k] = 0);
      allPins.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });
      document.getElementById("stat-total").textContent = allPins.length;
      // グループ小計（建物系・土地系・NG系）。カードが存在すれば反映。
      STATUS_GROUPS.forEach(g => {
        const sub = g.keys.reduce((n, k) => n + counts[k], 0);
        const el = document.getElementById("stat-group-" + g.key);
        if (el) el.textContent = sub;
      });
    }

    // ===== STAFF FILTER =====
    // 担当者リストは「現在の日付フィルタに出勤した人」だけに絞る（日付↔担当者の双方向連動）。
    // 構成基準は activeDateFilter のみ（自分=担当者では絞らない）＝ updateDateFilter と非再帰で対称。
    // 無限ループ防止：update系は互いを呼ばない。set系ハンドラだけが両update系を呼ぶ。
    function updateStaffFilter() {
      const base = allPins.filter(p => activeDateFilter === "all" || jstYmd(p.createdAt) === activeDateFilter);
      const emails = [...new Set(base.map(p => p.email).filter(Boolean))].sort();
      // 現在の担当者が新候補に無ければ「すべて」に戻す（無効な担当者を選んだままの0件破綻を防止）。
      if (activeStaffFilter !== "all" && !emails.includes(activeStaffFilter)) activeStaffFilter = "all";
      const sel = document.getElementById("staffFilter");
      sel.innerHTML = `<option value="all">担当者：すべて</option>` +
        emails.map(e => `<option value="${e}" ${e===activeStaffFilter?"selected":""}>${staffName(e)}</option>`).join("");
    }

    window.setStaffFilter = (val) => {
      activeStaffFilter = val;
      updateDateFilter();    // 担当者→日付リストを連動（無効日付は「すべて」にリセット）
      updateStaffFilter();   // 日付がリセットされ得るので担当者リスト/選択も整え直す
      renderList();
      renderMapMarkers();
    };

    // createdAt(ISO/UTC) を JST(+9h) の YYYY-MM-DD に。表示・フィルタ・Excelで共通利用（UTCずれ防止）。
    function jstYmd(iso) {
      const t = Date.parse(iso || "");
      if (Number.isNaN(t)) return "";
      return new Date(t + 9 * 3600 * 1000).toISOString().slice(0, 10);
    }

    // ===== DATE FILTER =====
    function updateDateFilter() {
      // 現在の担当者フィルタで絞ったピン集合から、JST日付のユニーク一覧を作る（status/dateは除外＝循環回避）。
      const base = allPins.filter(p => activeStaffFilter === "all" || p.email === activeStaffFilter);
      const dates = [...new Set(base.map(p => jstYmd(p.createdAt)).filter(Boolean))].sort().reverse();
      // 現在選択中の日付が新候補に無ければ「すべて」に戻す（無い日付を選んだままの0件破綻を防止）。
      if (activeDateFilter !== "all" && !dates.includes(activeDateFilter)) activeDateFilter = "all";
      const sel = document.getElementById("dateFilter");
      sel.innerHTML = `<option value="all">日付：すべて</option>` +
        dates.map(d => `<option value="${d}" ${d===activeDateFilter?"selected":""}>${d}</option>`).join("");
    }

    window.setDateFilter = (val) => {
      activeDateFilter = val;
      updateStaffFilter();   // 日付→担当者リストを連動（その日の出勤者だけ＋無効担当者はリセット）
      updateDateFilter();    // 担当者がリセットされ得るので日付リスト/選択も整え直す
      renderList();
      renderMapMarkers();
    };

    // ===== 要調査フィルタ =====
    // ON → needsReviewNow(p)（赤＝住所不明 or 地番未取得）だけ表示／OFF → 全件。
    // 日付・担当者・検索と filtered() 内で AND 結合。地図ピンも filtered() 経由で連動。
    window.setReviewOnly = (on) => {
      reviewOnly = !!on;
      renderList();
      renderMapMarkers();
    };

    // 総件数クリック → グループ絞りを解除して全グループ表示（＋要調査トグルもOFFへ）。
    // DD/担当者/日付/検索は独立ANDなので触らない（各自の「すべて」で解除）。
    window.showAll = () => {
      activeGroupFilter = "all";
      reviewOnly = false;
      const cb = document.getElementById("reviewOnlyToggle");
      if (cb) cb.checked = false;
      updateStatsHighlight();
      renderList();
      renderMapMarkers();
    };

    // グループ絞り（カウンターのショートカット）。同じグループ再クリックで解除＝全表示へ。
    window.setGroupFilter = (groupKey) => {
      activeGroupFilter = (activeGroupFilter === groupKey) ? "all" : groupKey;
      updateStatsHighlight();
      renderList();
      renderMapMarkers();
    };

    // ステータスDD（個別分類）。カウンターとは独立し filtered() 内でANDに合流。
    window.setStatusFilter = (val) => {
      activeStatusFilter = val;
      renderList();
      renderMapMarkers();
    };

    // 他社物件フィルタ（すべて/除外/だけ）。DM運用で他社物件を除外した状態別リストを出す用途。
    // 既存フィルタと filtered() 内でANDに合流。
    window.setOtherCompanyFilter = (val) => {
      otherCompanyFilter = val;
      renderList();
      renderMapMarkers();
    };

    // カウンターのハイライト。activeGroupFilter に対応する1枚だけ .active。
    // 総件数は「グループ絞りなし(all)」時にハイライト＝現在“全グループ表示”を示す。
    function updateStatsHighlight() {
      ["all", "building", "land", "ng"].forEach(k => {
        const el = document.getElementById("stat-item-" + k);
        if (el) el.classList.toggle("active", activeGroupFilter === k);
      });
    }

    // ステータスDDの選択肢を STATUS_GROUPS から生成（見出し=optgroupは選択不可）。1回だけ構築。
    function initStatusFilter() {
      const sel = document.getElementById("statusFilter");
      if (!sel) return;
      sel.innerHTML = `<option value="all">ステータス：すべて</option>` +
        STATUS_GROUPS.map(g =>
          `<optgroup label="${g.label}">` +
          g.keys.map(k => `<option value="${k}">${STATUS[k].label}</option>`).join("") +
          `</optgroup>`
        ).join("");
    }

    // 検索ヒット判定：タグNo(#1444/1444)・住所・地番を1文字列に連結して部分一致。
    // "#1444" でも "1444" でも同じ干し草に含まれるので両方ヒットする。
    function matchesSearch(p, q) {
      if (!q) return true;
      const seq = p.seqNo != null ? fmtSeq(p.seqNo) : "";           // "#1444"
      const seqRaw = p.seqNo != null ? String(p.seqNo) : "";        // "1444"
      const hay = [seq, seqRaw, p.address || "", p.chiban || ""].join(" ").toLowerCase();
      return hay.includes(q);
    }

    // カウンター(グループ)とDD(個別)を一本化した status 判定。判定元は STATUS_GROUPS のみ（二重定義しない）。
    // カウンター＝「そのグループの全分類を一括選択」/ DD＝単一分類。両者はANDで併用。
    // 矛盾組合せ(建物系×反社)は積集合が空→0件で正しく空表示。
    function statusAllowed(p) {
      if (activeGroupFilter !== "all") {
        const g = STATUS_GROUPS.find(x => x.key === activeGroupFilter);
        if (!g || !g.keys.includes(p.status)) return false;
      }
      if (activeStatusFilter !== "all" && p.status !== activeStatusFilter) return false;
      return true;
    }

    function filtered() {
      const q = searchQuery.trim().toLowerCase();
      return allPins.filter(p => {
        const reviewOk = !reviewOnly || isReviewFlagged(p);   // 要調査のみON時は赤ラベルだけ
        const staffOk  = activeStaffFilter  === "all" || p.email === activeStaffFilter;
        const dateOk   = activeDateFilter   === "all" || jstYmd(p.createdAt) === activeDateFilter;
        const searchOk = matchesSearch(p, q);   // 既存フィルタの最後に重ねがけ（AND）
        const statusOk = statusAllowed(p);       // カウンター(グループ)＋DD(個別)をANDで併用
        const oc = p.otherCompany === true;
        const ocOk = otherCompanyFilter === "all" || (otherCompanyFilter === "exclude" ? !oc : oc);
        return reviewOk && staffOk && dateOk && searchOk && statusOk && ocOk;
      });
    }

    // ===== 操作対象の共通判定（チェック基点）=====
    // Excel出力・出力取消が共有する。チェックが1件以上→チェックした案件、0件→表示中(filtered)全体。
    // ※削除だけはこの「0件→全件」を使わない（誤爆防止のためチェック必須・bulkDelete参照）。
    function selectionTargets() {
      return checkedIds.size > 0
        ? allPins.filter(p => checkedIds.has(p.id))
        : filtered();
    }

    // ===== SEARCH（インクリメンタル）=====
    window.setSearch = (val) => {
      searchQuery = val;
      const clr = document.getElementById("searchClear");
      if (clr) clr.style.display = val ? "block" : "none";
      renderList();
      renderMapMarkers();   // 地図ピンもリストと同じ表示集合に揃える
    };
    window.clearSearch = () => {
      searchQuery = "";
      const inp = document.getElementById("searchInput");
      if (inp) inp.value = "";
      const clr = document.getElementById("searchClear");
      if (clr) clr.style.display = "none";
      renderList();
      renderMapMarkers();
    };

    // ===== LIST =====
    // 固定連番の表示用フォーマット：3桁ゼロ埋め(#001)。1000件超は自然に4桁へ拡張。
    function fmtSeq(n) {
      return n != null ? "#" + String(n).padStart(3, "0") : "";
    }

    function renderList() {
      const pins = filtered();
      const container = document.getElementById("pinList");
      const hasChecked = checkedIds.size > 0;

      document.getElementById("bulkDeleteBtn").style.display = hasChecked ? "flex" : "none";
      document.getElementById("bulkDeleteBtn").textContent = `🗑 ${checkedIds.size}件削除`;

      // 全選択チェックボックスの状態を「現在表示中のピン」基準で同期
      const selCb = document.getElementById("selectAllCheck");
      if (selCb) {
        const allChecked = pins.length > 0 && pins.every(p => checkedIds.has(p.id));
        selCb.checked = allChecked;
        selCb.indeterminate = !allChecked && pins.some(p => checkedIds.has(p.id));
      }
      const selCnt = document.getElementById("selectCount");
      if (selCnt) selCnt.textContent = checkedIds.size ? `${checkedIds.size}件選択中` : "";

      if (pins.length === 0) {
        container.innerHTML = `<div class="empty">該当するピンがありません</div>`;
        return;
      }
      container.innerHTML = pins.map(p => {
        // 未定義ステータスでも崩れないようガード
        const s = STATUS[p.status];
        const sLabel = s ? s.label : (p.status || "不明");
        // 要確認（住所不明 or 地番未取得）はバッジを赤にして示す。色基準は needsReviewNow に統一。
        const review = isReviewFlagged(p);
        const sColor = review ? "#EF4444" : (isPermanentPin(p) ? PERMANENT_COLOR : (s ? s.color : FALLBACK_COLOR));
        const date = jstYmd(p.createdAt) || "–";
        const isChecked = checkedIds.has(p.id);
        const isSelected = selectedPinId === p.id;
        // Excel出力済み（exportedAt あり）はグレーアウト＋出力済行で未出力と区別。
        // 「拾った情報(発見日/担当者)」と「出力した情報」を分けるためカード末尾に独立行で出す。
        const exported = !!p.exportedAt;
        const exportedByName = p.exportedBy ? staffName(p.exportedBy) : "";
        const exportedMD = p.exportedAt
          ? `${Number(p.exportedAt.slice(5,7))}/${Number(p.exportedAt.slice(8,10))}` : "";
        // Googleマップの通常マップ表示で開く。座標があれば座標(ズレない)、無ければ住所でフォールバック。
        const gmapUrl = (p.lat != null && p.lng != null)
          ? `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`
          : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.address || "")}`;
        return `
        <div class="pin-card ${exported ? "exported" : ""} ${isChecked ? "checked" : ""} ${isSelected ? "selected" : ""}" id="card-${p.id}" onclick="selectPin('${p.id}')">
          <div class="pin-card-top">
            <input type="checkbox" class="pin-check" ${isChecked ? "checked" : ""}
              onclick="toggleCheck('${p.id}',event)">
            ${p.seqNo != null ? `<span class="pin-seq">${fmtSeq(p.seqNo)}</span>` : ""}
            <span class="status-badge" style="background:${sColor};color:#fff">${sLabel}</span>
            ${p.otherCompany ? `<span class="oc-badge" title="他社看板">🏢 他社物件</span>` : ""}
            <span class="pin-date">${date}</span>
            <span class="pin-staff">${staffName(p.email)}</span>
            <button class="del-btn" onclick="deletePin('${p.id}',event)">🗑</button>
          </div>
          <div class="pin-detail-row">
            <span class="detail-label">所在</span>
            <input class="detail-input addr-input ${p.addressManual ? "manual" : ""}" value="${escAttr(p.address)}" placeholder="住所不明"
              onchange="saveAddress('${p.id}',this.value)" onclick="event.stopPropagation()">
            ${p.addressManual ? `<span class="manual-badge" title="手修正済み">✎手修正</span>` : ""}
          </div>
          <div class="pin-detail-row">
            <span class="detail-label">地番</span>
            <input class="detail-input ${p.chibanManual ? "manual" : ""}" value="${escAttr(p.chiban)}" placeholder="未入力"
              onchange="saveChiban('${p.id}',this.value)" onclick="event.stopPropagation()">
            ${p.chibanManual
              ? `<span class="manual-badge" title="手修正済み">✎手修正</span>`
              : ((p.reviewReason === "参考地番・要確認" && p.chibanManual !== true)
                  ? `<button class="confirm-ref-btn" onclick="confirmRefChiban('${p.id}',event)" title="この参考地番を正として確定（打ち直し不要）">✓ ${escAttr(p.chiban)} で確定</button>`
                  : "")}
          </div>
          ${p.memo ? `<div class="surveyor-memo">📝 調査員メモ：${escAttr(p.memo)}</div>` : ""}
          <div class="pin-detail-row memo-row">
            <span class="detail-label">メモ</span>
            <textarea class="detail-input memo-input" rows="2" placeholder="メモ（任意）"
              onchange="saveAdminMemo('${p.id}',this.value)" onclick="event.stopPropagation()">${escAttr(p.adminMemo)}</textarea>
          </div>
          <div class="pin-actions">
            <a class="sv-btn" href="${gmapUrl}" target="_blank" onclick="event.stopPropagation()">🗺 地図で開く</a>
            <select class="status-sel" onchange="updateStatus('${p.id}',this.value)" onclick="event.stopPropagation()">
              ${statusOptionsHTML(p.status)}
            </select>
          </div>
          <label class="oc-toggle" onclick="event.stopPropagation()">
            <input type="checkbox" ${p.otherCompany ? "checked" : ""} onchange="toggleOtherCompany('${p.id}',this.checked)"> 🏢 他社物件（他社看板）
          </label>
          ${exported ? `<div class="export-line">✓ Excel出力済 ${exportedMD}${exportedByName ? ` ・ ${exportedByName}` : ""}</div>` : ""}
        </div>`;
      }).join("");
    }

    // ===== CHECKBOX =====
    window.toggleCheck = (id, e) => {
      e.stopPropagation();
      if (checkedIds.has(id)) { checkedIds.delete(id); }
      else { checkedIds.add(id); }
      renderList();
    };

    // ===== 全選択 / 全解除（現在表示中のピン基準） =====
    window.toggleSelectAll = (el) => {
      const pins = filtered();
      if (el.checked) { pins.forEach(p => checkedIds.add(p.id)); }
      else { pins.forEach(p => checkedIds.delete(p.id)); }
      renderList();
    };

    // ===== DELETE 1件 =====
    window.deletePin = async (id, e) => {
      e.stopPropagation();
      if (!confirm("このピンを削除しますか？")) return;
      try {
        await deleteDoc(doc(db, "pins", id));
        checkedIds.delete(id);
        showToast("削除しました");
      } catch(e) { showToast("削除に失敗しました", "error"); }
    };

    // ===== DELETE まとめて =====
    window.bulkDelete = async () => {
      if (checkedIds.size === 0) return;
      // 反社/NG（永久ピン）は一括削除からも除外（二重ガード）。
      const ids = [...checkedIds].filter(id => { const p = allPins.find(x => x.id === id); return !(p && isPermanentPin(p)); });
      const skipped = checkedIds.size - ids.length;
      if (ids.length === 0) { showToast("反社/NGは一括削除の対象外です（個別に🗑で削除してください）", "warn"); return; }
      if (!confirm(`${ids.length}件を削除しますか？${skipped ? `（反社/NG ${skipped}件は一括対象外・個別削除は可）` : ""}`)) return;
      try {
        await Promise.all(ids.map(id => deleteDoc(doc(db, "pins", id))));
        ids.forEach(id => checkedIds.delete(id));
        showToast("削除しました");
      } catch(e) { showToast("削除に失敗しました", "error"); }
    };

    // ===== MAP MARKERS =====
    function renderMapMarkers() {
      if (!map) return;
      markers.forEach(m => map.removeWidget(m));
      markers = [];
      filtered().forEach(p => {
        // 未定義ステータスでも落ちない・透明にならないようガード
        const s = STATUS[p.status];
        // マーカー色は「担当者(メール)ごとの固定色」。頭文字はステータスを示す。
        // 固定連番(seqNo)はマーカー上のHTMLオーバーレイ(#001形式)で表示する（下の UserWidget）。
        const marker = new ZDC.Marker(
          new ZDC.LatLng(p.lat, p.lng),
          { color: isPermanentPin(p) ? PERMANENT_COLOR : staffColor(p.email), text: s ? s.label[0] : "?" }
        );
        marker.pinId = p.id;
        marker.addEventListener("click", function() { selectPin(p.id); });
        map.addWidget(marker);
        markers.push(marker);

        // ピン番号ラベル(#001形式)をマーカーの上にHTMLオーバーレイ表示。
        // seqNo が無い旧データには付けない。pointer-events:none でマーカークリックを邪魔しない。
        if (p.seqNo != null) {
          // 要確認（住所不明 or 地番未取得）は赤背景で示す。現地画面(index.html)と色基準を統一。
          const labelBg = isReviewFlagged(p) ? "#EF4444"
            : (isPermanentPin(p) ? PERMANENT_COLOR : staffColor(p.email));
          // 他社物件フラグは背景色（色優先順位）を上書きせず、🏢＋黄土枠で重畳表示。
          const oc = p.otherCompany === true;
          const labelBorder = oc ? "2px solid #CA8A04" : "1px solid rgba(255,255,255,.65)";
          const seqLabel = new ZDC.UserWidget(
            new ZDC.LatLng(p.lat, p.lng),
            {
              htmlSource:
                '<div style="transform:translateX(-50%);white-space:nowrap;'
                + 'padding:1px 6px;border-radius:9px;'
                + 'background:' + labelBg + ';color:#fff;'
                + 'font-size:11px;font-weight:700;line-height:1.6;'
                + 'border:' + labelBorder + ';'
                + 'box-shadow:0 1px 3px rgba(0,0,0,.35);'
                + 'pointer-events:none;">' + fmtSeq(p.seqNo) + (oc ? ' 🏢' : '') + '</div>',
              offset: new ZDC.Point(0, -58),
              propagation: true,
            }
          );
          map.addWidget(seqLabel);
          // markers 配列に入れておけば再描画時の removeWidget ループで一緒に消える。
          markers.push(seqLabel);
        }
      });
    }
    
    // ===== SELECT PIN =====
    window.selectPin = (id) => {
      selectedPinId = id;

      document.querySelectorAll(".pin-card").forEach(c => c.classList.remove("selected"));
      const card = document.getElementById(`card-${id}`);
      if (card) {
        card.classList.add("selected");
        card.scrollIntoView({ behavior: "smooth", block: "nearest" });
        // 一時ハイライト：タップ毎に再生されるようリフローを挟んでアニメを付け直す
        card.classList.remove("flash");
        void card.offsetWidth;
        card.classList.add("flash");
      }

      renderMapMarkers();

      const pin = allPins.find(p => p.id === id);
      if (pin && map) {
        // 引いてたら閾値まで寄せ、既に寄ってたらズーム維持で中心だけ移動（事務員の作業ズームを壊さない）。
        const targetZoom = Math.max(map.getZoom(), ZOOM_READABLE);
        map.setCenter(new ZDC.LatLng(pin.lat, pin.lng));
        if (targetZoom !== map.getZoom()) map.setZoom(targetZoom);
        // レイヤON中は B-1 で追加の "idle" リスナが移動完了後に redrawActiveLayers() を呼び追従する。
      }
    };

    // ===== SAVE 地番（手修正）=====
    // 手修正は自動再取得より優先。値があれば chibanManual を立て、空なら解除（自動再取得に委ねる）。
    // needsReview は住所・地番を合わせた最新状態で再計算（埋まればfalse／空に戻せばtrue）。
    window.saveChiban = async (id, value) => {
      const p = allPins.find(x => x.id === id) || {};
      const chiban = value.trim();
      const review = needsReviewNow({ ...p, chiban });
      try {
        const update = {
          chiban,
          chibanManual: chiban ? true : deleteField(),
          needsReview: review,
        };
        if (!review) update.reviewReason = deleteField();
        await updateDoc(doc(db, "pins", id), update);
        showToast("地番を保存しました");
      } catch(e) { showToast("保存に失敗しました", "error"); }
    };

    // ===== 参考地番の「そのまま確定」=====
    // 参考地番(近傍筆)を打ち直さず正として確定。chibanは現在値のまま、手修正フラグを立てて
    // 要確認を解除（saveChibanの打ち直し確定と最終状態が同じ）。対象は参考地番(未手修正)のみ。
    window.confirmRefChiban = async (id, e) => {
      e.stopPropagation();
      const p = allPins.find(x => x.id === id) || {};
      if (p.reviewReason !== "参考地番・要確認" || p.chibanManual === true) return;   // 二重ガード
      try {
        await updateDoc(doc(db, "pins", id), {
          chibanManual: true,
          needsReview: false,
          reviewReason: deleteField(),
        });
        showToast("地番を確定しました");
      } catch(e) { showToast("確定に失敗しました", "error"); }
    };

    // ===== SAVE 住所（手修正）=====
    // 住所と地番は別管理。値があれば addressManual を立て、空なら解除。
    // needsReview は住所・地番を合わせた最新状態で再計算する。
    window.saveAddress = async (id, value) => {
      const p = allPins.find(x => x.id === id) || {};
      const address = value.trim();
      // 参考地番(要確認)は住所補正だけでは確定しない＝赤を維持。地番確定時のみ解除。
      const isRefChiban = p.reviewReason === "参考地番・要確認" && p.chibanManual !== true;
      const review = needsReviewNow({ ...p, address }) || isRefChiban;
      try {
        const update = {
          address,
          addressManual: address ? true : deleteField(),
          needsReview: review,
        };
        if (!review) update.reviewReason = deleteField();
        await updateDoc(doc(db, "pins", id), update);
        showToast("住所を保存しました");
      } catch(e) { showToast("保存に失敗しました", "error"); }
    };

    // ===== 住所ジオコーディング＋反社/NG登録（管理画面専用） =====
    // 住所→座標は ZENRIN Web API forward（admin既存WMSと同じ3ヘッダ認証。word=住所→position=[lon,lat]）。
    async function geocodeAddress(word) {
      const url = "https://test-web.zmaps-api.com/search/address?word=" + encodeURIComponent(word);
      const res = await fetch(url, { headers: { "x-api-key": WMS_KEY, "Authorization": "referer" } });
      const it = (await res.json()).result?.item?.[0];
      if (!it || !Array.isArray(it.position)) return null;
      return { lng: it.position[0], lat: it.position[1], address: it.address || word };
    }

    // 一時マーカー(登録前の仮位置★)を消す。登録成功/キャンセル/モードOFF/住所未ヒットで呼ぶ。
    function clearRegTempMarker() {
      if (regTempMarker) { try { map.removeWidget(regTempMarker); } catch(e){} regTempMarker = null; }
    }

    // 入力住所へ地図移動＋一時マーカー（req1・汎用の地図移動機能）。
    window.geocodeJump = async () => {
      const el = document.getElementById("geoInput");
      const word = (el?.value || "").trim();
      if (!word) return;
      showToast("住所を検索中…");
      let g = null;
      try { g = await geocodeAddress(word); } catch(e) { g = null; }
      if (!g) { clearRegTempMarker(); showToast("住所が見つかりません", "error"); return; }
      lastGeoLatLng = { lat: g.lat, lng: g.lng, address: g.address };
      if (map) {
        map.setCenter(new ZDC.LatLng(g.lat, g.lng));
        map.setZoom(Math.max(map.getZoom(), 17));
        clearRegTempMarker();
        regTempMarker = new ZDC.Marker(new ZDC.LatLng(g.lat, g.lng), { color: "#F59E0B", text: "★" });
        map.addWidget(regTempMarker);
      }
      showToast("移動：" + g.address);
    };

    window.setRegStatus = (v) => { if (v === "hansha" || v === "ng") regStatus = v; };

    // 反社/NGピンの採番（index.html と同じ meta/counter 方式・欠番あり運用）。
    async function nextSeqNo() {
      const counterRef = doc(db, "meta", "counter");
      let seq;
      await runTransaction(db, async (tx) => {
        const snap = await tx.get(counterRef);
        const next = snap.exists() ? (Number(snap.data().next) || 1) : 1;
        seq = next;
        tx.set(counterRef, { next: next + 1 }, { merge: true });
      });
      return seq;
    }

    // 反社/NG永久ピンを作成（住所登録・クリック登録の共通処理）。座標が最優先・住所はおまけ。
    async function createPermanentPin(lat, lng, address) {
      if (regStatus !== "hansha" && regStatus !== "ng") return false;
      const label = STATUS[regStatus]?.label || regStatus;
      if (!confirm(`この位置に「${label}」ピンを登録しますか？\n${address || "（住所なし）"}`)) { clearRegTempMarker(); return false; }
      try {
        const pinData = {
          uid: auth.currentUser?.uid || "",
          email: auth.currentUser?.email || "",
          lat, lng,
          address: address || "",
          chiban: "",
          status: regStatus,
          memo: "",
          branch: myBranch,
          needsReview: false,
          createdAt: new Date().toISOString(),
          seqNo: await nextSeqNo(),
        };
        await addDoc(collection(db, "pins"), pinData);   // onSnapshot が拾って自動再描画
        clearRegTempMarker();
        showToast(`「${label}」ピンを登録しました`);
        return true;
      } catch(e) { showToast("登録に失敗しました", "error"); console.error("createPermanentPin", e); return false; }
    }

    // 方法A：住所ジオコード座標に登録
    window.registerFromAddress = async () => {
      if (!lastGeoLatLng) { showToast("先に住所で地図へ移動してください", "warn"); return; }
      await createPermanentPin(lastGeoLatLng.lat, lastGeoLatLng.lng, lastGeoLatLng.address);
    };

    // 方法B：地図クリック登録モード ON/OFF
    // ボタン表示・カーソル・仮マーカー掃除を一括反映（トグルと自動OFFで共通利用）。
    function applyRegModeUI() {
      const btn = document.getElementById("regModeBtn");
      if (btn) { btn.classList.toggle("active", regMode); btn.textContent = regMode ? "📍クリック登録：ON" : "📍クリック登録：OFF"; }
      const mapEl = document.getElementById("map"); if (mapEl) mapEl.style.cursor = regMode ? "crosshair" : "";
      if (!regMode) clearRegTempMarker();   // モードOFFで仮位置★を残さない
    }
    // 内部状態を真実として反映（ON/OFFを明示指定）。オートOFF等から呼ぶ。
    function setRegMode(on) { regMode = !!on; applyRegModeUI(); }
    // ボタンから呼ぶトグル。旧: onclick="toggleRegMode(!regMode)" は regMode が module スコープ変数のため
    // インラインhandler(グローバル評価)から参照不可でReferenceError→ハンドラが落ちてON化しなかった。
    // 引数を取らず内部状態を反転するだけに修正。
    window.toggleRegMode = () => setRegMode(!regMode);

    // 方法Bのクリック時：reverseで住所補完（失敗しても座標優先で登録は継続）。
    async function registerFromClick(latlng) {
      let address = "";
      try {
        const r = await fetch(`https://zenrin-ptddjpvgeq-an.a.run.app?type=reverse&lat=${latlng.lat}&lon=${latlng.lng}`);
        address = (await r.json()).result?.item?.[0]?.address || "";
      } catch(e) { address = ""; }   // reverse失敗は無視（座標が最優先・住所はおまけ）
      const ok = await createPermanentPin(latlng.lat, latlng.lng, address);
      if (ok) setRegMode(false);   // 登録成功後は自動OFF（誤ピン防止）。失敗/キャンセルはON維持で再クリック可
    }

    // ===== SAVE 事務員メモ（adminMemo）=====
    // 調査員メモ(memo)とは別フィールド。adminMemo だけを更新し、memo には絶対に触れない
    // （調査員の現地メモを事務員編集で潰さないための分離）。
    // needsReview（赤判定）・要調査フィルタには一切関与させない。空欄は空文字で保存。
    window.saveAdminMemo = async (id, value) => {
      const adminMemo = value.trim();
      try {
        await updateDoc(doc(db, "pins", id), { adminMemo });
        showToast("事務員メモを保存しました");
      } catch(e) { showToast("保存に失敗しました", "error"); }
    };

    // ===== 他社物件フラグのトグル（admin手動付替・移行用）=====
    // status とは独立の属性。gyoubutsu撤去で灰色化した旧ピンの付替や、通常の設定/解除に使う。
    window.toggleOtherCompany = async (id, checked) => {
      try {
        await updateDoc(doc(db, "pins", id), { otherCompany: checked });
        showToast(checked ? "他社物件に設定しました" : "他社物件を解除しました");
      } catch(e) { showToast("更新に失敗しました", "error"); }
    };

    // ===== UPDATE STATUS =====
    window.updateStatus = async (id, status) => {
      try {
        await updateDoc(doc(db, "pins", id), { status });
        showToast("ステータスを更新しました");
      } catch(e) { showToast("更新に失敗しました", "error"); }
    };

    // ===== EXCEL EXPORT (SheetJS) =====
    // 住居表示を「町名まで」と「番地のみ」に分割する。
    // 例: 愛知県名古屋市中村区亀島2丁目25-4 → ["愛知県名古屋市中村区亀島2丁目", "25-4"]
    function splitAddress(addr) {
      const a = (addr || "").trim();
      if (!a) return ["", ""];
      // 丁目があればそこで分割（丁目内の数字は町名側に残す）
      const m1 = a.match(/^(.*丁目)(.*)$/);
      if (m1) return [m1[1].trim(), m1[2].trim()];
      // 丁目なし: 末尾の番地（数字＋ハイフン＋番地/号/の）を切り出す
      const m2 = a.match(/^(.*?)([0-9０-９][0-9０-９\-－‐番地号の]*)$/);
      if (m2) return [m2[1].trim(), m2[2].trim()];
      return [a, ""];
    }
    window.exportExcel = async () => {
      // 対象判定はチェック基点（出力・取消・削除で共通の考え方）。
      //  チェックあり → チェックした案件のみ出力／チェックなし → 表示中(filtered)全体を出力（普段の運用）。
      const pins = selectionTargets();
      if (pins.length === 0) { showToast("出力対象のピンがありません", "error"); return; }
      if (typeof XLSX === "undefined") { showToast("Excelライブラリの読込に失敗しました", "error"); return; }
      // 列順: No/所在地/住居表記/地番/レ/ステータス/調査員メモ/事務員メモ/発見日/担当者/緯度/経度/拠点
      // （メモは2系統：調査員memo=現地メモ／事務員adminMemo。レ＝REINS確認用の空白列は維持）
      const header = ["No","所在地","住居表記","地番","レ","ステータス","調査員メモ","事務員メモ","発見日","担当者","緯度","経度","拠点"];
      const aoa = [header];
      pins.forEach((p) => {
        const [town, banchi] = splitAddress(p.address);
        aoa.push([
          fmtSeq(p.seqNo),     // No: 地図ピン・カードと同じ固定連番(seqNo)。出力での再採番はしない
          town,                // 所在地
          banchi || "",        // 住居表記(番地)：型は下で文字列に固定
          p.chiban || "",      // 地番：型は下で文字列に固定
          "",                  // レ：REINS確認用の空白列（事務員が手入力。維持）
          STATUS[p.status]?.label || p.status, // ステータス
          p.memo || "",        // 調査員メモ（現地memo）：型は下で文字列に固定
          p.adminMemo || "",   // 事務員メモ（adminMemo）：型は下で文字列に固定
          jstYmd(p.createdAt), // 発見日：JST固定（表示・フィルタと一致）
          staffName(p.email),  // 担当者
          p.lat ?? "",         // 緯度
          p.lng ?? "",         // 経度
          p.branch || "",      // 拠点
        ]);
      });
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      // No(0)・住居表記(2)・地番(3)・調査員メモ(6)・事務員メモ(7)は "71-1"/"#313"/数字だけのメモ等を
      // Excelが日付/数値化しないよう文字列型(t:'s')で固定。xlsxはセル型を保持するので ="..." ハック不要。
      const STR_COLS = [0, 2, 3, 6, 7];
      for (let r = 1; r < aoa.length; r++) {
        STR_COLS.forEach(c => {
          const cell = ws[XLSX.utils.encode_cell({ r, c })];
          if (cell && cell.v !== "") { cell.t = "s"; cell.v = String(cell.v); delete cell.w; delete cell.z; }
        });
      }
      // 列幅（実務で見やすい既定）
      ws["!cols"] = [
        { wch: 6 }, { wch: 28 }, { wch: 12 }, { wch: 12 }, { wch: 4 }, { wch: 8 },
        { wch: 24 }, { wch: 24 }, { wch: 12 }, { wch: 10 }, { wch: 11 }, { wch: 11 }, { wch: 8 },
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "空家マップ");
      XLSX.writeFile(wb, `空家マップ_${new Date().toISOString().slice(0,10)}.xlsx`);
      // 出力対象に exportedAt を記録（一覧で出力済みグレーアウト表示に使う）。
      // ファイルは既にDL済みなので書き込み失敗は握りつぶし、出力自体は止めない。
      const exportedAt = new Date().toISOString();
      const exportedBy = auth.currentUser?.email || "";
      await Promise.all(
        pins.map(p => updateDoc(doc(db, "pins", p.id), { exportedAt, exportedBy }).catch(()=>{}))
      );
      showToast(`Excelを出力しました（${pins.length}件・出力済みに記録）`);
    };

    // ===== EXCEL出力済みの取消（未出力に戻す）=====
    // 出力済み記録は exportedAt(ISO文字列)＋exportedBy(メール)の2フィールド。両方 deleteField で除去。
    // 対象判定はチェック基点（selectionTargets）＝出力と同じ。そのうち「出力済み」だけを取り消す。
    //  - チェックあり → チェックした案件のうち出力済みのみ／チェックなし → 表示中(filtered)の出力済み全部。
    //  - 確認ダイアログは出力済みのみカウントし、チェック有無で文言を出し分け。
    window.unexportAll = async () => {
      const hasChecked = checkedIds.size > 0;
      const targets = selectionTargets().filter(p => !!p.exportedAt);
      if (targets.length === 0) {
        showToast(hasChecked ? "選択中に出力済みの物件はありません" : "表示中に出力済みの物件はありません", "error");
        return;
      }
      const msg = hasChecked
        ? `選択した ${targets.length}件 を未出力に戻します。よろしいですか？`
        : `表示中の出力済み ${targets.length}件 を未出力に戻します。よろしいですか？`;
      if (!confirm(msg)) return;
      try {
        await Promise.all(
          targets.map(p => updateDoc(doc(db, "pins", p.id), { exportedAt: deleteField(), exportedBy: deleteField() }))
        );
        showToast(`${targets.length}件を未出力に戻しました`);
      } catch(e) { showToast("取消に失敗しました", "error"); }
    };

    // ===== TOAST =====
    function showToast(msg, type = "ok") {
      const t = document.getElementById("toast");
      t.textContent = msg; t.className = "toast " + type;
      t.style.opacity = "1";
      setTimeout(() => { t.style.opacity = "0"; }, 2500);
    }

    window.addEventListener("keydown", e => {
      if (e.key === "Enter" && document.getElementById("loginScreen").style.display !== "none") doLogin();
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #f1f5f9; color: #1e293b; height: 100vh; overflow: hidden; }

    #loginScreen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; background: #0f172a; gap: 16px; padding: 24px;
    }
    .login-logo { font-size: 12px; font-weight: 700; letter-spacing: 0.2em; color: #475569; text-transform: uppercase; }
    .login-title { font-size: 22px; font-weight: 700; color: #f8fafc; margin-bottom: 8px; }
    .login-box { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; }
    .login-box input {
      padding: 13px 16px; border-radius: 8px; border: 1px solid #334155;
      background: #1e293b; color: #f8fafc; font-size: 15px; font-family: inherit; outline: none;
    }
    .login-box input:focus { border-color: #3b82f6; }
    #loginBtn {
      padding: 13px; border-radius: 8px; background: #3b82f6; color: #fff;
      font-size: 15px; font-weight: 700; border: none; cursor: pointer;
    }
    #loginBtn:disabled { background: #334155; cursor: not-allowed; }

    #adminScreen {
      display: none;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 380px 1fr;
      height: 100vh;
    }

    .header {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px; background: #0f172a; border-bottom: 1px solid #1e293b;
    }
    .header-title { font-size: 15px; font-weight: 700; color: #f8fafc; margin-right: 4px; }
    #userLabel { font-size: 12px; color: #64748b; }
    .header-spacer { flex: 1; }
    #staffFilter, #dateFilter, #statusFilter, #otherCompanyFilter {
      padding: 6px 10px; border-radius: 6px; border: 1px solid #334155;
      background: #1e293b; color: #94a3b8; font-size: 12px; font-family: inherit; outline: none; cursor: pointer;
    }
    .csv-btn {
      padding: 7px 16px; border-radius: 6px; background: #10b981; color: #fff;
      font-size: 13px; font-weight: 700; border: none; cursor: pointer;
    }
    /* 出力取消＝グレー（出力＝緑と区別） */
    .csv-btn.undo-btn { background: #6b7280; }
    .csv-btn.undo-btn:hover { background: #4b5563; }
    /* 調査グリッド進捗の表示トグル。OFF=グレー枠 / ON=青塗りで状態を明示 */
    .grid-btn {
      padding: 7px 14px; border-radius: 6px; background: transparent;
      border: 1px solid #334155; color: #94a3b8; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .grid-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    /* データ重畳トグル（用途地域/地番）。グリッドボタンと同系。ON時に色付け */
    .layer-btn { padding:7px 14px;border-radius:6px;background:transparent;border:1px solid #334155;
      color:#94a3b8;font-size:13px;font-weight:700;cursor:pointer; }
    .layer-btn.active { background:#2563eb;border-color:#2563eb;color:#fff; }
    .layer-btn.youto.active { background:#d97706;border-color:#d97706; } /* 用途地域ON=オレンジで区別 */
    /* 用途地域 クリック属性ポップアップ（地図右上） */
    .youto-info { position:absolute;top:10px;right:10px;max-width:300px;z-index:20;
      background:rgba(15,23,42,.94);color:#e2e8f0;border:1px solid #334155;border-radius:8px;
      padding:10px 12px;font-size:12px;line-height:1.6;box-shadow:0 4px 14px rgba(0,0,0,.4); }
    .youto-info .yi-close { float:right;cursor:pointer;color:#94a3b8;font-weight:700;margin-left:8px; }
    .youto-info b { color:#fbbf24; }
    .logout-btn {
      padding: 7px 14px; border-radius: 6px; background: transparent;
      border: 1px solid #334155; color: #94a3b8; font-size: 13px; cursor: pointer;
    }

    .left-panel {
      display: flex; flex-direction: column;
      background: #fff; border-right: 1px solid #e2e8f0; overflow: hidden;
    }

    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: #e2e8f0; border-bottom: 1px solid #e2e8f0; flex-shrink: 0;
    }
    .stat-item {
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 4px; background: #fff; cursor: pointer;
    }
    .stat-num { font-size: 18px; font-weight: 700; color: #1e293b; line-height: 1; }
    .stat-label { font-size: 10px; color: #94a3b8; margin-top: 2px; }
    /* カウンターのグループ絞り選択中ハイライト */
    .stat-item.active { background: #eff6ff; box-shadow: inset 0 -2px 0 #3b82f6; }
    .stat-item.active .stat-label { color: #3b82f6; font-weight: 700; }

    .filter-bar {
      display: flex; gap: 6px; padding: 8px 10px; overflow-x: auto;
      border-bottom: 1px solid #f1f5f9; flex-shrink: 0;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    /* 要調査のみトグル（旧・種別ドロップダウンの位置）。赤ラベル案件だけ絞り込む。 */
    .review-toggle {
      flex: 1; display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 8px; border: 1px solid #e2e8f0;
      font-size: 12px; font-weight: 600; color: #1e293b; background: #fff;
      cursor: pointer; user-select: none;
    }
    .review-toggle:hover { border-color: #ef4444; }
    .review-toggle input { width: 15px; height: 15px; cursor: pointer; accent-color: #ef4444; }

    /* 検索バー：要調査トグルの直下。インクリメンタル＋×クリア。 */
    .search-bar {
      display: flex; align-items: center; gap: 6px;
      margin: 0 10px 4px; padding: 6px 10px;
      border-radius: 8px; border: 1px solid #e2e8f0; background: #fff;
    }
    .search-bar:focus-within { border-color: #3b82f6; }
    .search-icon { font-size: 12px; color: #94a3b8; flex-shrink: 0; }
    .search-input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 13px; font-family: inherit; color: #1e293b; min-width: 0;
    }
    .search-input::-webkit-search-cancel-button { display: none; }
    .search-clear {
      border: none; background: #f1f5f9; color: #64748b; cursor: pointer;
      width: 20px; height: 20px; border-radius: 999px; font-size: 11px;
      line-height: 1; flex-shrink: 0;
    }
    .search-clear:hover { background: #e2e8f0; }

    .select-all-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin: 6px 8px 0; padding: 6px 10px;
      border-radius: 8px; background: #f8fafc; border: 1px solid #e2e8f0;
    }
    .select-all-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: #334155; cursor: pointer; user-select: none;
    }
    .select-all-label input { cursor: pointer; }
    .select-count { font-size: 12px; color: #64748b; }

    #bulkDeleteBtn {
      display: none; align-items: center; justify-content: center;
      gap: 6px; margin: 6px 8px; padding: 8px;
      border-radius: 8px; background: #fef2f2; border: 1px solid #fca5a5;
      color: #991b1b; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    #bulkDeleteBtn:hover { background: #fee2e2; }

    #pinList { flex: 1; overflow-y: auto; padding: 8px; }
    #pinList::-webkit-scrollbar { width: 4px; }
    #pinList::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }
    .empty { padding: 40px; text-align: center; color: #94a3b8; font-size: 14px; }

    .pin-card {
      border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px;
      margin-bottom: 8px; cursor: pointer; transition: all 0.15s; background: #fff;
    }
    .pin-card:hover { border-color: #94a3b8; }
    .pin-card.selected { border-color: #3b82f6; box-shadow: 0 0 0 2px #bfdbfe; background: #eff6ff; }
    .pin-card.checked { background: #fef9c3; border-color: #eab308; }
    .pin-card.checked.selected { background: #fef9c3; border-color: #3b82f6; }
    /* Excel出力済みピン：グレーアウトで未出力と区別 */
    .pin-card.exported { opacity: 0.55; }
    .pin-card.exported.selected,
    .pin-card.exported.checked { opacity: 1; }  /* 選択/チェック時は見やすく戻す */
    .export-line {
      font-size: 11px; font-weight: 700; color: #fff; background: #6b7280;
      padding: 2px 8px; border-radius: 4px; margin-top: 6px;
      display: inline-block;
    }
    /* ピンタップ時の一時ハイライト（数秒フラッシュ） */
    .pin-card.flash { animation: cardFlash 2s ease-out; }
    @keyframes cardFlash {
      0%   { background: #fde68a; box-shadow: 0 0 0 3px #fbbf24; }
      100% { background: #fff;    box-shadow: none; }
    }

    .pin-card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .pin-check { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .pin-seq { font-size: 13px; font-weight: 800; color: #334155; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    /* 他社物件バッジ（状態色は保持し重畳表示。黄土色#CA8A04で識別） */
    .oc-badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; color: #fff; background: #CA8A04; white-space: nowrap; }
    .pin-date { font-size: 11px; color: #94a3b8; margin-left: auto; }
    .pin-staff { font-size: 11px; color: #94a3b8; }
    .del-btn {
      padding: 2px 6px; border-radius: 4px; background: transparent;
      border: 1px solid #fca5a5; color: #ef4444; font-size: 12px; cursor: pointer;
    }
    .del-btn:hover { background: #fef2f2; }

    .pin-address { font-size: 13px; font-weight: 500; color: #1e293b; margin-bottom: 4px; line-height: 1.4; }
    /* 調査員メモ：admin では表示専用（編集不可）。現地メモの参照用。 */
    .surveyor-memo {
      font-size: 12px; color: #475569; background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 6px; padding: 5px 8px; margin-bottom: 8px; line-height: 1.4;
      white-space: pre-wrap; word-break: break-word;
    }

    .pin-detail-row {
      display: grid; grid-template-columns: 32px 1fr auto; gap: 4px; align-items: center;
      margin-bottom: 8px;
    }
    /* メモ行：複数行textareaなのでラベルを上端揃えに */
    .pin-detail-row.memo-row { align-items: start; }
    .detail-label { font-size: 11px; color: #94a3b8; font-weight: 500; white-space: nowrap; }
    .detail-input {
      padding: 5px 8px; border-radius: 5px; border: 1px solid #e2e8f0;
      font-size: 12px; font-family: inherit; outline: none; color: #1e293b; width: 100%;
    }
    /* メモ入力：高さ可変（最低2行相当）。縦だけ伸ばせる */
    .memo-input { resize: vertical; min-height: 40px; line-height: 1.4; box-sizing: border-box; }
    .memo-row .detail-label { padding-top: 5px; }
    .detail-input:focus { border-color: #3b82f6; }
    .detail-input.manual { border-color: #16a34a; background: #f0fdf4; }
    .manual-badge {
      font-size: 10px; color: #16a34a; background: #dcfce7; font-weight: 600;
      padding: 2px 6px; border-radius: 999px; white-space: nowrap;
    }
    .confirm-ref-btn {
      padding: 4px 9px; border-radius: 6px; background: #16a34a; color: #fff;
      border: 1px solid #15803d; font-size: 11px; font-weight: 600; cursor: pointer;
      white-space: nowrap; font-family: inherit;
    }
    .confirm-ref-btn:hover { background: #15803d; }

    /* 他社物件トグル（admin手動付替・移行用）。黄土色アクセント。 */
    .oc-toggle { display: flex; align-items: center; gap: 6px; margin-top: 8px;
      font-size: 12px; font-weight: 600; color: #92400e; cursor: pointer; user-select: none; }
    .oc-toggle input { width: 15px; height: 15px; accent-color: #CA8A04; cursor: pointer; }

    .pin-actions { display: flex; gap: 6px; align-items: center; }
    .sv-btn {
      padding: 5px 10px; border-radius: 6px; background: #f1f5f9;
      border: 1px solid #e2e8f0; font-size: 12px; cursor: pointer; white-space: nowrap;
      text-decoration: none; color: #1e293b; display: inline-flex; align-items: center;
    }
    .sv-btn:hover { background: #e2e8f0; }
    .status-sel {
      flex: 1; padding: 5px 8px; border-radius: 6px; border: 1px solid #e2e8f0;
      font-size: 12px; font-family: inherit; outline: none; background: #fff; cursor: pointer;
    }

    .right-panel { display: flex; flex-direction: column; position: relative; }
    #map { flex: 1; width: 100%; }
    /* 反社/NG登録ツールバー（管理画面専用） */
    .admin-reg-bar { padding: 8px 10px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 6px; }
    .reg-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .geo-input { flex: 1; min-width: 180px; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; }
    .geo-input:focus { border-color: #3b82f6; }
    .reg-label { font-size: 12px; font-weight: 600; color: #374151; white-space: nowrap; }
    .reg-radio { font-size: 13px; color: #1e293b; display: inline-flex; align-items: center; gap: 3px; cursor: pointer; }
    .reg-btn { padding: 6px 11px; border-radius: 6px; background: #374151; color: #fff; border: 1px solid #1f2937; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit; }
    .reg-btn:hover { background: #1f2937; }
    .reg-toggle.active { background: #ef4444; border-color: #dc2626; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500;
      z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.ok    { background: #065f46; color: #6ee7b7; }
    .toast.error { background: #7f1d1d; color: #fca5a5; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">HOUSE MARKET</div>
  <div class="login-title">空家マップ｜管理画面</div>
  <div class="login-box">
    <input id="email" type="email" placeholder="メールアドレス" autocomplete="email">
    <input id="pass"  type="password" placeholder="パスワード">
    <button id="loginBtn" onclick="doLogin()">ログイン</button>
  </div>
</div>

<div id="adminScreen">
  <div class="header">
    <div class="header-title">🏚 空家マップ 管理画面</div>
    <div id="userLabel"></div>
    <div class="header-spacer"></div>
    <select id="dateFilter" onchange="setDateFilter(this.value)">
      <option value="all">日付：すべて</option>
    </select>
    <select id="staffFilter" onchange="setStaffFilter(this.value)">
      <option value="all">担当者：すべて</option>
    </select>
    <select id="statusFilter" onchange="setStatusFilter(this.value)">
      <option value="all">ステータス：すべて</option>
    </select>
    <select id="otherCompanyFilter" onchange="setOtherCompanyFilter(this.value)" title="他社物件の除外/だけ表示（DM運用）">
      <option value="all">他社物件：すべて</option>
      <option value="exclude">他社物件：除外</option>
      <option value="only">他社物件：だけ</option>
    </select>
    <button class="grid-btn" id="gridBtn" onclick="toggleGridMode()" title="調査グリッド進捗の表示切替">▦ グリッド</button>
    <button class="layer-btn youto" id="youtoBtn" onclick="toggleYouto()" title="用途地域 色分け＋クリックで属性">用途地域</button>
    <button class="layer-btn" id="chibanBtn" onclick="toggleChiban()" title="地番（ブルーマップ）重畳">地番</button>
    <button class="csv-btn" onclick="exportExcel()">📥 Excel出力</button>
    <button class="csv-btn undo-btn" onclick="unexportAll()" title="チェックがあれば選択分／無ければ表示中の出力済みを未出力に戻す">↩ 出力取消</button>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>

  <div class="left-panel">
    <!-- 集計カウンタ：総件数＋グループ小計（建物系/土地系/NG系）の4枚。表示専用。
         数字は updateStats() が stat-total / stat-group-* に反映。絞り込みは下のドロップダウンで。 -->
    <div class="stats-bar">
      <div class="stat-item" id="stat-item-all" onclick="showAll()" title="全グループ表示に戻す">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">総件数</div>
      </div>
      <div class="stat-item" id="stat-item-building" onclick="setGroupFilter('building')" title="建物系だけ表示">
        <div class="stat-num" style="color:#3B82F6" id="stat-group-building">0</div>
        <div class="stat-label">建物系</div>
      </div>
      <div class="stat-item" id="stat-item-land" onclick="setGroupFilter('land')" title="土地系だけ表示">
        <div class="stat-num" style="color:#10B981" id="stat-group-land">0</div>
        <div class="stat-label">土地系</div>
      </div>
      <div class="stat-item" id="stat-item-ng" onclick="setGroupFilter('ng')" title="NG系だけ表示">
        <div class="stat-num" style="color:#1F2937" id="stat-group-ng">0</div>
        <div class="stat-label">NG系</div>
      </div>
    </div>

    <div class="filter-bar">
      <label class="review-toggle">
        <input type="checkbox" id="reviewOnlyToggle" onchange="setReviewOnly(this.checked)">
        <span>⚠️ 要調査のみ（住所不明・地番未取得）</span>
      </label>
    </div>

    <!-- 検索：No(#1444/1444)・住所・地番の部分一致。既存フィルタにANDで重ねがけ。 -->
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input id="searchInput" class="search-input" type="search" placeholder="No・住所・地番で検索"
        oninput="setSearch(this.value)" autocomplete="off">
      <button id="searchClear" class="search-clear" onclick="clearSearch()" title="クリア" style="display:none">✕</button>
    </div>

    <div class="select-all-bar">
      <label class="select-all-label">
        <input type="checkbox" id="selectAllCheck" onchange="toggleSelectAll(this)">
        全選択
      </label>
      <span class="select-count" id="selectCount"></span>
    </div>

    <button id="bulkDeleteBtn" onclick="bulkDelete()">🗑 0件削除</button>

    <div id="pinList"><div class="empty">データを読み込み中…</div></div>
  </div>

  <div class="right-panel">
    <!-- 反社/NG登録＋住所ジャンプ（管理画面専用。調査員側index.htmlには出さない） -->
    <div class="admin-reg-bar">
      <div class="reg-row">
        <input id="geoInput" class="geo-input" type="search" placeholder="住所を入力して地図へ移動（管理者用）"
          onkeydown="if(event.key==='Enter'){event.preventDefault();geocodeJump();}" autocomplete="off">
        <button class="reg-btn" onclick="geocodeJump()">🔎 移動</button>
      </div>
      <div class="reg-row">
        <span class="reg-label">反社/NG登録</span>
        <label class="reg-radio"><input type="radio" name="regStatus" value="hansha" checked onchange="setRegStatus('hansha')"> 反社</label>
        <label class="reg-radio"><input type="radio" name="regStatus" value="ng" onchange="setRegStatus('ng')"> NG</label>
        <button class="reg-btn" onclick="registerFromAddress()">この住所位置に登録</button>
        <button id="regModeBtn" class="reg-btn reg-toggle" onclick="toggleRegMode()">📍クリック登録：OFF</button>
      </div>
    </div>
    <div id="map"></div>
    <div id="youtoInfo" class="youto-info" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
</body>
</html>
